name: aggregator-dpg

# Local-dev + VM-deployable stack for the Blue Dots Aggregator Portal.
#
# Foundations: Postgres, Redis, Keycloak (+ keycloak-init sidecar), Mailpit.
# Apps:        web (Next.js BFF), api (Fastify), worker (BullMQ consumer).
# Edge:        jonasal/nginx-certbot terminates TLS on :443 and proxies all
#              browser-facing traffic — no service exposes its own host port.
#
# Quick start (VM, real domain, Let's Encrypt cert):
#   cp infra/env.template .env
#   # set PUBLIC_HOST, CERTBOT_EMAIL, all change-me-* secrets
#   # set S3_REGION + S3_BUCKET; ensure VM IAM role has s3:* on the bucket
#   chmod 600 .env
#   docker compose up -d
#   docker compose logs -f nginx api worker
#
# URLs (after `up`) — all browser-facing services proxied through nginx:443:
#   Web app           : ${PUBLIC_PROTOCOL}://${PUBLIC_HOST}/
#   API               : ${PUBLIC_PROTOCOL}://${PUBLIC_HOST}/backend/
#   Keycloak          : ${PUBLIC_PROTOCOL}://${PUBLIC_HOST}/auth/   admin / ${KC_BOOTSTRAP_ADMIN_PASSWORD}
#
# Backing services (Postgres/Redis/MinIO) publish NO host ports on this base
# file — they are reachable only inside the compose network (postgres:5432,
# redis:6379, minio:9000). For local hybrid dev (apps run outside Docker),
# `make up` / `pnpm stack:up` layer docker-compose.dev.yml, which binds those
# ports to 127.0.0.1 only (Postgres 5433, Redis 6379, MinIO 9000/9001) and
# enables the `storage` profile for MinIO. A bare `docker compose up -d` (the
# VM path) stays locked down.
#
# Object storage is AWS S3 (regional endpoint, IAM-role credentials). The
# VM's EC2 instance profile must grant s3:GetObject, s3:PutObject,
# s3:HeadObject, s3:DeleteObject on the bucket. No keys live in .env.

services:
  # ─────────────────────────────────────────────────────────────────────────
  # Foundations
  # ─────────────────────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    container_name: aggregator-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-aggregator}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
      POSTGRES_DB: ${POSTGRES_DB:-aggregator}
    # No host port mapping — reachable only as `postgres:5432` inside the
    # compose network. Host access for `pnpm --filter ... dev` comes from the
    # loopback-bound port in docker-compose.dev.yml (make up / stack:up layers it).
    volumes:
      - aggregator-postgres-data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aggregator} -d ${POSTGRES_DB:-aggregator}"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: aggregator-redis
    restart: unless-stopped
    command: ["redis-server", "--save", "60", "1", "--loglevel", "warning"]
    # No host port mapping — reachable only as `redis:6379` inside the compose
    # network. Host access for local dev comes from docker-compose.dev.yml.
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── Local S3-compatible object storage (dev / docker-only testing) ────────
  # Use only when S3_ENDPOINT is set in .env. In prod the stack still hits
  # real AWS S3 via the EC2 instance role and this container is unused
  # (it just runs idle on :9000/:9001 — harmless, or comment out the service).
  #
  # Host port mapping:
  #   9000 → S3 API   (used by api/worker via http://minio:9000 inside the
  #                    docker network, and by the BROWSER for presigned URLs
  #                    via http://localhost:9000 → S3_PUBLIC_ENDPOINT)
  #   9001 → console  (web UI, minioadmin / ${MINIO_ROOT_PASSWORD})
  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: aggregator-minio
    restart: unless-stopped
    # Dev/docker-only. Gated behind the `storage` profile so a plain
    # `docker compose up` on a VM (which uses real AWS S3 via the instance
    # role) never starts it — no idle container, no exposed :9000/:9001, no
    # default-credential surface in prod. `make up` / `stack:up` enable the
    # profile for local development.
    profiles: ["storage"]
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      # MinIO ignores AWS region but the SDK signs requests with whatever
      # S3_REGION the apps configure — keep them aligned to avoid sigv4 grief.
      MINIO_REGION: ${S3_REGION:-us-east-1}
    # No host port mapping — reachable as `minio:9000` inside the compose
    # network. Host access (presigned-URL browser flow + console) comes from
    # the loopback-bound ports in docker-compose.dev.yml.
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9000/minio/health/live || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s

  # Creates the bucket once MinIO is healthy. Idempotent — re-running is safe.
  minio-init:
    image: minio/mc:RELEASE.2025-04-16T18-13-26Z
    container_name: aggregator-minio-init
    # Same `storage` profile as minio — only runs when local MinIO is enabled.
    profiles: ["storage"]
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      S3_BUCKET: ${S3_BUCKET:-aggregator-bulk-uploads}
    entrypoint:
      - sh
      - -c
      - |
        set -e
        mc alias set local http://minio:9000 "$$MINIO_ROOT_USER" "$$MINIO_ROOT_PASSWORD"
        mc mb --ignore-existing "local/$$S3_BUCKET"
        echo "minio-init: bucket '$$S3_BUCKET' ready"
    restart: "no"

  keycloak:
    image: quay.io/keycloak/keycloak:26.5.5
    container_name: aggregator-keycloak
    restart: unless-stopped
    # build: re-bake plugin into the official image so providers/ is on classpath
    # AND `kc.sh build` has already indexed our SPIs. render-realm.sh substitutes
    # __PUBLIC_BASE_URL__ + __SMTP_*__ in the realm JSON before exec'ing kc.sh
    # start-dev --import-realm. The keycloak-init sidecar then re-applies SMTP +
    # unmanagedAttributePolicy via REST so they take effect even when the realm
    # already existed in postgres from a previous boot.
    entrypoint: ["/opt/keycloak/render-realm.sh"]
    command: ["start-dev", "--import-realm"]
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KC_BOOTSTRAP_ADMIN_USERNAME:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KC_BOOTSTRAP_ADMIN_PASSWORD:?KC_BOOTSTRAP_ADMIN_PASSWORD must be set in .env}
      # Client secrets substituted into the realm import by render-realm.sh so the
      # checked-in realm JSON carries no real credentials. Fail-hard when unset —
      # these must equal the values the api/web services read below.
      AGGREGATOR_API_SECRET: ${KEYCLOAK_ADMIN_CLIENT_SECRET:?KEYCLOAK_ADMIN_CLIENT_SECRET must be set in .env}
      AGGREGATOR_PORTAL_SECRET: ${OIDC_CLIENT_SECRET:?OIDC_CLIENT_SECRET must be set in .env}
      AGGREGATOR_BFF_SECRET: ${BFF_SERVICE_CLIENT_SECRET:?BFF_SERVICE_CLIENT_SECRET must be set in .env}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: ${POSTGRES_USER:-aggregator}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD:-aggregator-dev}
      KC_HOSTNAME: ${PUBLIC_HOST:-keycloak}
      # Substituted into realm JSON at boot (clients[].redirectUris,
      # webOrigins, post.logout.redirect.uris). Must be the browser-facing
      # base URL — same value the web/api services use to derive OIDC_ISSUER.
      PUBLIC_BASE_URL: "${PUBLIC_PROTOCOL:-http}://${PUBLIC_HOST:-localhost}"
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
      KC_HEALTH_ENABLED: "true"
      # Behind nginx: serve under /auth/ subpath and trust X-Forwarded-* from the proxy.
      KC_HTTP_RELATIVE_PATH: /auth
      KC_PROXY_HEADERS: xforwarded
      # SMS provider — use 'log' for local dev (writes OTP to keycloak logs).
      # Switch to 'twilio', 'sns' or 'msg91' in .env once creds are configured.
      KC_SPI_SMS_PROVIDER: ${KC_SPI_SMS_PROVIDER:-log}
      # Twilio (only used when KC_SPI_SMS_PROVIDER=twilio)
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:-}
      TWILIO_FROM_NUMBER: ${TWILIO_FROM_NUMBER:-}
      # AWS SNS (only used when KC_SPI_SMS_PROVIDER=sns)
      AWS_REGION: ${AWS_REGION:-ap-south-1}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      # MSG91 (only used when KC_SPI_SMS_PROVIDER=msg91). DLT-compliant Flow API.
      MSG91_AUTH_KEY: ${MSG91_AUTH_KEY:-}
      MSG91_TEMPLATE_ID: ${MSG91_TEMPLATE_ID:-}
      MSG91_SENDER_ID: ${MSG91_SENDER_ID:-}
      MSG91_OTP_VAR_NAME: ${MSG91_OTP_VAR_NAME:-var}
      # SMTP for email OTP. Substituted into the realm's smtpServer block by
      # render-realm.sh — the realm JSON itself only has __SMTP_*__ placeholders.
      # Defaults target the in-stack Mailpit so first-boot login works with no
      # .env edits; override these per environment to point at real SMTP.
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_FROM: ${SMTP_FROM:-no-reply@bluedots.local}
      SMTP_FROM_DISPLAY: ${SMTP_FROM_DISPLAY:-Blue Dots Aggregator}
      SMTP_AUTH: ${SMTP_AUTH:-false}
      SMTP_STARTTLS: ${SMTP_STARTTLS:-false}
      SMTP_SSL: ${SMTP_SSL:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
    # ─── Brand surfaces ─────────────────────────────────────────────────
    # Brand strings (BRAND_*, HERO_*) travel with the network config; the
    # active set is selected by `AGGREGATOR_NETWORK` in .env, which picks
    # `config/<network>/keycloak.env`. theme.properties reads them via
    # `${env.VAR:default}`; render-realm.sh substitutes `BRAND_LONG_NAME`
    # into the realm JSON's `displayName`.
    env_file:
      - ./config/${AGGREGATOR_NETWORK:-blue_dot}${AGGREGATOR_BRAND:+/${AGGREGATOR_BRAND}}/keycloak.env
    # No host port mapping — exposed only via nginx at /auth/.
    volumes:
      - ./infra/keycloak/realms:/opt/keycloak/data/import-template:ro
      - ./infra/keycloak/providers:/opt/keycloak/providers:ro
      - ./infra/keycloak/render-realm.sh:/opt/keycloak/render-realm.sh:ro
      # Disk theme overrides the JAR-baked theme so brand env vars take
      # effect without rebaking the provider JAR.
      - ./infra/keycloak/themes:/opt/keycloak/themes:ro
    # render-realm.sh writes substituted realm JSON here on each boot. tmpfs
    # keeps the host tree clean and ensures stale renders never persist.
    tmpfs:
      - /opt/keycloak/data/import:uid=1000,gid=0,mode=0775
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      # KC_HTTP_RELATIVE_PATH=/auth applies to the management interface too,
      # so the readiness endpoint moved from /health/ready → /auth/health/ready.
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/9000 && echo -e 'GET /auth/health/ready HTTP/1.1\\r\\nhost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && head -1 <&3 | grep -q '200'"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s

  # Post-import init: applies SMTP + unmanagedAttributePolicy via Keycloak
  # admin REST. Idempotent — safe to re-run on every `docker compose up`.
  # Complements render-realm.sh: the latter only takes effect on first
  # realm import; this sidecar re-applies config when the realm already
  # exists in postgres.
  keycloak-init:
    image: alpine:3.20
    container_name: aggregator-keycloak-init
    depends_on:
      keycloak:
        condition: service_healthy
    environment:
      # Internal URL — must include /auth because KC_HTTP_RELATIVE_PATH=/auth.
      KC_URL: http://keycloak:8080/auth
      KC_REALM: ${KEYCLOAK_REALM:-aggregator}
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KC_BOOTSTRAP_ADMIN_USERNAME:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KC_BOOTSTRAP_ADMIN_PASSWORD}
      UNMANAGED_POLICY: ENABLED
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_FROM: ${SMTP_FROM:-no-reply@bluedots.local}
      SMTP_FROM_DISPLAY: ${SMTP_FROM_DISPLAY:-Blue Dots Aggregator}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      # Drives client reconciliation in step 3 of apply-user-profile.sh:
      # flips aggregator-portal to confidential and syncs the secret so it
      # matches whatever the BFF (web service) is configured with.
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET:-}
      PORTAL_CLIENT_ID: ${OIDC_CLIENT_ID:-aggregator-portal}
      # API confidential client whose service account creates the org KC group
      # + assigns org_owner (needs realm-management:manage-realm).
      API_CLIENT_ID: ${KEYCLOAK_ADMIN_CLIENT_ID:-aggregator-api}
    volumes:
      - ./infra/keycloak/init:/init:ro
    entrypoint: ["sh", "-c", "apk add --no-cache curl jq > /dev/null && sh /init/apply-user-profile.sh"]
    restart: "no"

  # ─────────────────────────────────────────────────────────────────────────
  # Apps
  # ─────────────────────────────────────────────────────────────────────────

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      # NEXT_PUBLIC_* vars must be present at image build time (Next.js inlines
      # them into the client bundle during `next build`). Pass them as build args
      # so the Dockerfile ARG/ENV declarations can forward them to `next build`.
      args:
        NEXT_PUBLIC_API_URL: "${PUBLIC_PROTOCOL:-http}://${PUBLIC_HOST:-localhost}/backend"
        NEXT_PUBLIC_ENABLED_LANGUAGES: "${NEXT_PUBLIC_ENABLED_LANGUAGES:-en,kn,hi}"
    image: aggregator-dpg/web:dev
    container_name: aggregator-web
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
      # All browser-visible URLs go through nginx on :443 — no service port suffixes.
      NEXT_PUBLIC_API_URL: "${PUBLIC_PROTOCOL:-http}://${PUBLIC_HOST:-localhost}/backend"
      NEXT_PUBLIC_ENABLED_LANGUAGES: "${NEXT_PUBLIC_ENABLED_LANGUAGES:-en,kn,hi}"
      API_BASE_URL: ${API_BASE_URL:-http://api:4000}
      # Gates the "Register Organisation" tab; read server-side by the register
      # page. Must match the api's ORG_HIERARCHY_ENABLED so both agree.
      ORG_HIERARCHY_ENABLED: ${ORG_HIERARCHY_ENABLED:-false}
      # ─── OIDC (Authorization Code + PKCE) ────────────────────────────
      # OIDC_ISSUER must resolve identically from the browser AND the web
      # container. With nginx as the sole ingress, both reach Keycloak via
      # ${PUBLIC_PROTOCOL}://${PUBLIC_HOST}/auth/realms/${realm}. The web
      # container's back-channel call is short-circuited to the docker host
      # gateway via the `extra_hosts` mapping below.
      OIDC_ISSUER: "${PUBLIC_PROTOCOL:-http}://${PUBLIC_HOST:-localhost}/auth/realms/${KEYCLOAK_REALM:-aggregator}"
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID:-aggregator-portal}
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET:-}
      OIDC_REDIRECT_URI: "${PUBLIC_PROTOCOL:-http}://${PUBLIC_HOST:-localhost}/api/auth/callback"
      OIDC_POST_LOGOUT_REDIRECT_URI: "${PUBLIC_PROTOCOL:-http}://${PUBLIC_HOST:-localhost}/"
      OIDC_SCOPE: ${OIDC_SCOPE:-openid profile email}
      # ─── BFF service token (anonymous-proxy routes like /api/aggregator/register) ──
      # The web BFF mints a Keycloak service-account token via the dedicated,
      # minimal-scope `aggregator-bff` client to authorise upstream calls made on
      # behalf of an unauthenticated browser. It deliberately does NOT reuse the
      # `aggregator-api` client: that client holds realm-management (manage-realm
      # + manage-users), so sharing its secret with the internet-facing BFF would
      # make a BFF secret leak a full-realm-admin compromise. Fail-hard if unset.
      BFF_SERVICE_CLIENT_ID: ${BFF_SERVICE_CLIENT_ID:-aggregator-bff}
      BFF_SERVICE_CLIENT_SECRET: ${BFF_SERVICE_CLIENT_SECRET:?BFF_SERVICE_CLIENT_SECRET must be set in .env}
      # ─── Session ──────────────────────────────────────────────────────
      SESSION_COOKIE_NAME: ${SESSION_COOKIE_NAME:-sid}
      COOKIE_SECURE: ${COOKIE_SECURE:-}
      PUBLIC_PORTAL_URL: "${PUBLIC_PROTOCOL:-http}://${PUBLIC_HOST:-localhost}"
      SESSION_TTL_SECONDS: ${SESSION_TTL_SECONDS:-43200}
      # SESSION_KEY signs the short-lived OIDC handshake cookie. Generate
      # with `openssl rand -hex 32` and store in .env. Must be ≥32 chars.
      SESSION_KEY: ${SESSION_KEY:?SESSION_KEY must be set in .env}
      # ─── Redis (BFF session store) ────────────────────────────────────
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      # TLS certs are VERIFIED by default. For local https OIDC against a
      # self-signed pebble cert, use the dev overlay (make up / stack:up already
      # layers it): docker compose -f docker-compose.yml -f docker-compose.dev.yml.
      # Never set this to 0 in production — apps/*/src/config.ts assertTlsPosture
      # refuses to boot. For a real internal-CA cert, mount it via NODE_EXTRA_CA_CERTS
      # instead of disabling verification.
      NODE_TLS_REJECT_UNAUTHORIZED: ${NODE_TLS_REJECT_UNAUTHORIZED:-1}
      # Deployment environment; arms the TLS guard on the VM path by default.
      INSTANCE_ENV: ${INSTANCE_ENV:-production}
      # Brand selectors — the app derives SCHEMA_ROOT_DIR from these two vars.
      # Set AGGREGATOR_BRAND to select a brand subfolder (e.g. upsdm);
      # leave empty for the base network. SCHEMA_ROOT_DIR / AGGREGATOR_CONFIG_PATH
      # are still accepted as explicit overrides if needed.
      AGGREGATOR_NETWORK: ${AGGREGATOR_NETWORK:-blue_dot}
      AGGREGATOR_BRAND: ${AGGREGATOR_BRAND:-}
      CONFIG_ROOT: /app/config
    # No host port mapping — exposed only via nginx at /.
    # Resolve PUBLIC_HOST (the VM's public IP) to the docker host gateway so
    # the BFF's back-channel OIDC discovery + token exchange reaches nginx via
    # the bridge instead of bouncing through AWS routing.
    extra_hosts:
      - "${PUBLIC_HOST:-localhost}:host-gateway"
    volumes:
      - ./config:/app/config:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      api:
        condition: service_healthy

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    image: aggregator-dpg/api:dev
    container_name: aggregator-api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: "4000"
      HOST: "0.0.0.0"
      LOG_LEVEL: ${LOG_LEVEL:-info}
      CORS_ORIGINS: "${PUBLIC_PROTOCOL:-http}://${PUBLIC_HOST:-localhost}"
      DATABASE_URL: postgres://${POSTGRES_USER:-aggregator}:${POSTGRES_PASSWORD:-aggregator-dev}@postgres:5432/${POSTGRES_DB:-aggregator}
      RUN_MIGRATIONS_ON_BOOT: "true"
      # Keycloak admin (service account). Must equal the public issuer prefix
      # so the JWT `iss` claim matches what `expectedIssuer()` derives from
      # KEYCLOAK_URL (apps/api/src/services/auth/access-token.ts).
      KEYCLOAK_URL: "${PUBLIC_PROTOCOL:-http}://${PUBLIC_HOST:-localhost}/auth"
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-aggregator}
      KEYCLOAK_ADMIN_CLIENT_ID: ${KEYCLOAK_ADMIN_CLIENT_ID:-aggregator-api}
      KEYCLOAK_ADMIN_CLIENT_SECRET: ${KEYCLOAK_ADMIN_CLIENT_SECRET:-}
      # JWT client-scoping (#1.7): azp allow-list (enforced) + optional aud check.
      KEYCLOAK_ALLOWED_AZP: ${KEYCLOAK_ALLOWED_AZP:-aggregator-portal,aggregator-api,aggregator-bff}
      KEYCLOAK_EXPECTED_AUDIENCE: ${KEYCLOAK_EXPECTED_AUDIENCE:-}
      # Mailer — `smtp` (default, points at Mailpit in compose) or `ses`
      MAIL_PROVIDER: ${MAIL_PROVIDER:-smtp}
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-no-reply@bluedots.local}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      AWS_REGION: ${AWS_REGION:-ap-south-1}
      SES_FROM: ${SES_FROM:-}
      SES_CONFIGURATION_SET: ${SES_CONFIGURATION_SET:-}
      # Org hierarchy — when true, registers the org-registration + approval
      # routes. Must match the web app's ORG_HIERARCHY_ENABLED so both agree.
      ORG_HIERARCHY_ENABLED: ${ORG_HIERARCHY_ENABLED:-false}
      # Approval flow
      APPROVAL_TOKEN_SECRET: ${APPROVAL_TOKEN_SECRET:?APPROVAL_TOKEN_SECRET must be set in .env (≥32 chars)}
      ADMIN_EMAILS: ${ADMIN_EMAILS:-admin@bluedots.local}
      PUBLIC_API_URL: "${PUBLIC_PROTOCOL:-http}://${PUBLIC_HOST:-localhost}/backend"
      PUBLIC_PORTAL_URL: "${PUBLIC_PROTOCOL:-http}://${PUBLIC_HOST:-localhost}"
      # ─── Object storage (bulk uploads + QR PNGs + errors.csv) ────────
      # AWS S3 via IAM role on the VM. S3_ENDPOINT/S3_PUBLIC_ENDPOINT are
      # intentionally unset — the SDK uses the regional AWS endpoint.
      # S3_ACCESS_KEY_ID / S3_SECRET_ACCESS_KEY are unset so the default
      # credential chain picks up the EC2 instance role.
      S3_REGION: ${S3_REGION:-ap-south-1}
      S3_BUCKET: ${S3_BUCKET:-aggregator-bulk-uploads}
      S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE:-false}
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      S3_PUBLIC_ENDPOINT: ${S3_PUBLIC_ENDPOINT:-}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      BULK_UPLOAD_URL_TTL_SECONDS: ${BULK_UPLOAD_URL_TTL_SECONDS:-900}
      BULK_UPLOAD_MAX_BYTES: ${BULK_UPLOAD_MAX_BYTES:-10485760}
      QR_DOWNLOAD_URL_TTL_SECONDS: ${QR_DOWNLOAD_URL_TTL_SECONDS:-900}
      PUBLIC_LINK_BASE_URL: ${PUBLIC_LINK_BASE_URL:-${PUBLIC_PROTOCOL:-http}://${PUBLIC_HOST:-localhost}}
      # Brand selectors — the api derives AGGREGATOR_CONFIG_PATH and SCHEMA_ROOT_DIR
      # from these two vars. Set AGGREGATOR_BRAND to select a brand subfolder (e.g. upsdm);
      # leave empty for the base network. AGGREGATOR_CONFIG_PATH / SCHEMA_ROOT_DIR
      # are still accepted as explicit overrides if needed.
      # `SIGNALSTACK_ITEM_NETWORK` below must match the network id the
      # selected config resolves to (always the base network, never the brand).
      AGGREGATOR_NETWORK: ${AGGREGATOR_NETWORK:-blue_dot}
      AGGREGATOR_BRAND: ${AGGREGATOR_BRAND:-}
      CONFIG_ROOT: /app/config
      # Deploy-time override for the signalstack network.json URL (#512);
      # empty = use `aggregator.network.source` from the YAML.
      AGGREGATOR_NETWORK_SOURCE: ${AGGREGATOR_NETWORK_SOURCE:-}
      # ── Outward push to signalstack (onboard) and read (blue-dots) ───
      SIGNALSTACK_BASE_URL: ${SIGNALSTACK_BASE_URL:-}
      SIGNALSTACK_ADMIN_KEY: ${SIGNALSTACK_ADMIN_KEY:-}
      # Platform-wide acting-org id sent as `x-acting-org-id` on the admin
      # aggregator upsert. Required for the approval flow to register each
      # newly-approved aggregator as a signalstack org.
      SIGNALSTACK_ACTING_ORG_ID: ${SIGNALSTACK_ACTING_ORG_ID:-}
      SIGNALSTACK_ITEM_NETWORK: ${AGGREGATOR_NETWORK:-blue_dot}
      SIGNALSTACK_TIMEOUT_MS: ${SIGNALSTACK_TIMEOUT_MS:-10000}
      # TLS certs are VERIFIED by default (see web service note + the config
      # guard). Never 0 in production; use the dev overlay for a local pebble
      # cert, or NODE_EXTRA_CA_CERTS for a real internal CA.
      NODE_TLS_REJECT_UNAUTHORIZED: ${NODE_TLS_REJECT_UNAUTHORIZED:-1}
      INSTANCE_ENV: ${INSTANCE_ENV:-production}
    # No host port mapping — exposed only via nginx at /backend/.
    # See `extra_hosts` rationale on the web service: api hits Keycloak via
    # the public URL for both admin REST + JWKS, so we short-circuit DNS to
    # the host gateway where nginx listens.
    extra_hosts:
      - "${PUBLIC_HOST:-localhost}:host-gateway"
    volumes:
      # Mount the whole config tree (read-only) so per-network/brand subfolders
      # (e.g. config/blue_dot/upsdm) are available without rebaking the image.
      # Active paths are picked by AGGREGATOR_NETWORK/AGGREGATOR_BRAND env.
      - ./config:/app/config:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:4000/health/ready || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_healthy

  # ── Bulk-upload + cron worker ────────────────────────────────────────────
  # BullMQ consumer for: bulk-file-process, bulk-row-process, bulk-finalise,
  # link-metrics-rollup, cron-watchdog. Mirrors the API's config wiring
  # (DB / Redis / S3) since the same code paths run.
  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    image: aggregator-dpg/worker:dev
    container_name: aggregator-worker
    restart: unless-stopped
    environment:
      NODE_ENV: production
      LOG_LEVEL: ${LOG_LEVEL:-info}
      # Worker makes outward TLS calls (SIGNALSTACK_BASE_URL); verify certs by
      # default and arm the config guard on the VM path. See the web/api notes.
      NODE_TLS_REJECT_UNAUTHORIZED: ${NODE_TLS_REJECT_UNAUTHORIZED:-1}
      INSTANCE_ENV: ${INSTANCE_ENV:-production}
      DATABASE_URL: postgres://${POSTGRES_USER:-aggregator}:${POSTGRES_PASSWORD:-aggregator-dev}@postgres:5432/${POSTGRES_DB:-aggregator}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      # ─── Object storage (raw CSV download + errors.csv write) ──────
      # AWS S3 via IAM role on the VM — see notes on the api service.
      S3_REGION: ${S3_REGION:-ap-south-1}
      S3_BUCKET: ${S3_BUCKET:-aggregator-bulk-uploads}
      S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE:-false}
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      S3_PUBLIC_ENDPOINT: ${S3_PUBLIC_ENDPOINT:-}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      # ─── Schemas (participant validators) ──────────────────────────
      # Brand selectors — the worker derives AGGREGATOR_CONFIG_PATH and SCHEMA_ROOT_DIR
      # from these two vars. Set AGGREGATOR_BRAND to select a brand subfolder (e.g. upsdm);
      # leave empty for the base network. AGGREGATOR_CONFIG_PATH / SCHEMA_ROOT_DIR
      # are still accepted as explicit overrides if needed.
      # `SIGNALSTACK_ITEM_NETWORK` below must match the network id the
      # selected config resolves to (always the base network, never the brand).
      AGGREGATOR_NETWORK: ${AGGREGATOR_NETWORK:-blue_dot}
      AGGREGATOR_BRAND: ${AGGREGATOR_BRAND:-}
      CONFIG_ROOT: /app/config
      # Deploy-time override for the signalstack network.json URL (#512);
      # empty = use `aggregator.network.source` from the YAML.
      AGGREGATOR_NETWORK_SOURCE: ${AGGREGATOR_NETWORK_SOURCE:-}
      # ─── File processor row caps ───────────────────────────────────
      BULK_MAX_ROWS: ${BULK_MAX_ROWS:-10000}
      BULK_MAX_ROW_BYTES: ${BULK_MAX_ROW_BYTES:-65536}
      # ─── Cron intervals (ms) ───────────────────────────────────────
      LINK_METRICS_ROLLUP_INTERVAL_MS: ${LINK_METRICS_ROLLUP_INTERVAL_MS:-300000}
      WATCHDOG_INTERVAL_MS: ${WATCHDOG_INTERVAL_MS:-3600000}
      # ─── Outward push to signalstack (onboard) ───────────────────
      SIGNALSTACK_BASE_URL: ${SIGNALSTACK_BASE_URL:-}
      SIGNALSTACK_ADMIN_KEY: ${SIGNALSTACK_ADMIN_KEY:-}
      SIGNALSTACK_ITEM_NETWORK: ${AGGREGATOR_NETWORK:-blue_dot}
      SIGNALSTACK_TIMEOUT_MS: ${SIGNALSTACK_TIMEOUT_MS:-10000}
    volumes:
      # Mount the whole config tree (read-only) so per-network/brand subfolders
      # (e.g. config/blue_dot/upsdm) are available without rebaking the image.
      # Active paths are picked by AGGREGATOR_NETWORK/AGGREGATOR_BRAND env.
      - ./config:/app/config:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ─────────────────────────────────────────────────────────────────────────
  # Edge: nginx reverse proxy + Let's Encrypt — single ingress on 80/443.
  #
  # jonasal/nginx-certbot bundles nginx + certbot + auto-renewal. On first
  # boot it generates a self-signed dummy cert so nginx can start, then
  # certbot performs an HTTP-01 challenge (port 80 must be reachable from
  # the public internet) and replaces the dummy with a real LE cert.
  #
  # Two config layers, both included by jonasal's main nginx.conf inside
  # the http {} block:
  #   1. ./infra/nginx/user_conf.d/*.conf      → mounted as-is
  #      (shared http-scope: maps, upstreams, proxy/buffer settings)
  #   2. ./infra/nginx/templates/*.template    → rendered via envsubst at
  #      boot, output to /etc/nginx/conf.d/*.conf (server blocks with
  #      ${PUBLIC_HOST} substituted in server_name + ssl_certificate paths)
  # ─────────────────────────────────────────────────────────────────────────

  nginx:
    image: jonasal/nginx-certbot:5.4.1
    container_name: aggregator-nginx
    restart: unless-stopped
    environment:
      # Required by certbot for cert expiry / abuse notifications.
      CERTBOT_EMAIL: ${CERTBOT_EMAIL:?CERTBOT_EMAIL must be set in .env}
      # USE_LOCAL_CA=1 issues self-signed certs via pebble — useful for
      # smoke-testing the ingress without burning Let's Encrypt rate limits.
      # Set to 0 (or unset) for production.
      USE_LOCAL_CA: ${USE_LOCAL_CA:-0}
      # Substituted into the .template file at boot. Both the SSL listener's
      # server_name and the ssl_certificate paths reference this — keep one
      # source of truth so cert request and TLS listener always agree.
      PUBLIC_HOST: ${PUBLIC_HOST:?PUBLIC_HOST must be set in .env}
      # Restrict envsubst to PUBLIC_HOST only — leaves all $-prefixed nginx
      # variables ($host, $scheme, $remote_addr, etc.) untouched.
      NGINX_ENVSUBST_FILTER: '^PUBLIC_HOST$$'
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/user_conf.d:/etc/nginx/user_conf.d:ro
      - ./infra/nginx/templates:/etc/nginx/templates:ro
      - nginx-letsencrypt:/etc/letsencrypt
    depends_on:
      web:
        condition: service_started
      api:
        condition: service_healthy
      keycloak:
        condition: service_healthy

volumes:
  aggregator-postgres-data:
  redis-data:
  minio-data:
  # Persists Let's Encrypt account keys + issued certs across container
  # restarts. Wiping this volume forces a fresh ACME registration — be
  # mindful of LE rate limits (5 duplicate certs per week per domain).
  nginx-letsencrypt:
