name: aggregator-dpg

# Local-dev stack for the Blue Dots Aggregator Portal.
#
# Foundations: Postgres, Redis, MinIO, Keycloak, MailHog.
# Apps:        web (Next.js).  api + worker placeholders are commented in once
#              those services exist (see apps/api stub).
#
# Quick start:
#   cp .env.example .env
#   docker compose up -d
#   docker compose logs -f web
#
# URLs (after `up`):
#   Web app           : http://localhost:3000
#   API (later)       : http://localhost:4000
#   Keycloak          : http://localhost:8080      admin / ${KC_BOOTSTRAP_ADMIN_PASSWORD}
#   MinIO console     : http://localhost:9001      ${MINIO_ROOT_USER} / ${MINIO_ROOT_PASSWORD}
#   MinIO S3 API      : http://localhost:9000
#   MailHog UI        : http://localhost:8025      (captures every outbound email)
#   Postgres          : localhost:5432             aggregator / ${POSTGRES_PASSWORD}
#   Redis             : localhost:6379
#
# Email delivery is intentionally not part of the local stack. Configure SMTP
# externally (Keycloak realm SMTP settings, API SMTP env vars) when needed.

services:
  # ─────────────────────────────────────────────────────────────────────────
  # Foundations
  # ─────────────────────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    container_name: aggregator-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-aggregator}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
      POSTGRES_DB: ${POSTGRES_DB:-aggregator}
    ports:
      - "5433:5432"   # host 5433 → container 5432 (avoids clashes with a system Postgres on 5432)
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aggregator} -d ${POSTGRES_DB:-aggregator}"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: aggregator-redis
    restart: unless-stopped
    command: ["redis-server", "--save", "60", "1", "--loglevel", "warning"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  mailhog:
    image: mailhog/mailhog:v1.0.1
    container_name: aggregator-mailhog
    restart: unless-stopped
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8025/api/v2/messages"]
      interval: 10s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2024-12-13T22-19-12Z
    container_name: aggregator-minio
    restart: unless-stopped
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD must be set in .env}
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web console
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 3s
      retries: 10

  keycloak:
    image: quay.io/keycloak/keycloak:26.5.5
    container_name: aggregator-keycloak
    restart: unless-stopped
    # build: re-bake plugin into the official image so providers/ is on classpath
    # AND `kc.sh build` has already indexed our SPIs. start-dev uses --import-realm
    # to load realm JSON on first boot.
    command: ["start-dev", "--import-realm"]
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KC_BOOTSTRAP_ADMIN_USERNAME:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KC_BOOTSTRAP_ADMIN_PASSWORD:?KC_BOOTSTRAP_ADMIN_PASSWORD must be set in .env}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: ${POSTGRES_USER:-aggregator}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD:-aggregator-dev}
      # KC_HOSTNAME drives the iss claim; must match the OIDC_ISSUER set
      # for the web container so token validation succeeds. The host's
      # /etc/hosts maps `keycloak` → 127.0.0.1 so browsers can reach the
      # auth_endpoint URL too. Override in .env for staging/prod.
      KC_HOSTNAME: ${KC_HOSTNAME:-keycloak}
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
      KC_HEALTH_ENABLED: "true"
      # SMS provider — use 'log' for local dev (writes OTP to keycloak logs).
      # Switch to 'twilio' or 'sns' in .env once creds are configured.
      KC_SPI_SMS_PROVIDER: ${KC_SPI_SMS_PROVIDER:-log}
      # Twilio (only used when KC_SPI_SMS_PROVIDER=twilio)
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:-}
      TWILIO_FROM_NUMBER: ${TWILIO_FROM_NUMBER:-}
      # AWS SNS (only used when KC_SPI_SMS_PROVIDER=sns)
      AWS_REGION: ${AWS_REGION:-ap-south-1}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      # SMTP for email OTP — populate in .env to enable email channel.
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_FROM: ${SMTP_FROM:-no-reply@example.com}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
    ports:
      - "8080:8080"
    volumes:
      - ./infra/keycloak/realms:/opt/keycloak/data/import:ro
      - ./infra/keycloak/providers:/opt/keycloak/providers:ro
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/9000 && echo -e 'GET /health/ready HTTP/1.1\\r\\nhost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && head -1 <&3 | grep -q '200'"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s

  # ─────────────────────────────────────────────────────────────────────────
  # Apps
  # ─────────────────────────────────────────────────────────────────────────

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    image: aggregator-dpg/web:dev
    container_name: aggregator-web
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
      NEXT_PUBLIC_API_URL: "${PUBLIC_PROTOCOL:-http}://${PUBLIC_HOST:-localhost}:${API_PORT:-4000}"
      API_BASE_URL: ${API_BASE_URL:-http://api:4000}
      # ─── OIDC (Authorization Code + PKCE) ────────────────────────────
      # OIDC_ISSUER MUST be reachable from BOTH the browser and the web
      # container. In compose, `keycloak:8080` works inside the network
      # but not from the browser. Two viable setups:
      #   (a) Real DNS in staging/prod (e.g. https://auth.example.com)
      #       — both browser and container resolve identically. Default.
      #   (b) Local dev w/ docker only: add to /etc/hosts on the host
      #       `127.0.0.1 keycloak` and set OIDC_ISSUER=http://keycloak:8080/...
      #       so both sides agree.
      # For pure dev iteration, run web with `pnpm --filter @aggregator-dpg/web dev`
      # so OIDC_ISSUER=http://localhost:8080/... works for both.
      OIDC_ISSUER: ${OIDC_ISSUER:-http://keycloak:${KC_PORT:-8080}/realms/${KEYCLOAK_REALM:-aggregator}}
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID:-aggregator-portal}
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET:-}
      # ─── BFF service-account (client_credentials) ─────────────────────
      # Used by anonymous BFF routes (e.g. POST /api/aggregator/register)
      # to obtain a service-account token for upstream API calls.
      BFF_SERVICE_CLIENT_ID: ${BFF_SERVICE_CLIENT_ID:-aggregator-api}
      BFF_SERVICE_CLIENT_SECRET: ${BFF_SERVICE_CLIENT_SECRET:-}
      OIDC_REDIRECT_URI: "${PUBLIC_PROTOCOL:-http}://${PUBLIC_HOST:-localhost}:${PORTAL_PORT:-3100}/api/auth/callback"
      OIDC_POST_LOGOUT_REDIRECT_URI: "${PUBLIC_PROTOCOL:-http}://${PUBLIC_HOST:-localhost}:${PORTAL_PORT:-3100}/"
      OIDC_SCOPE: ${OIDC_SCOPE:-openid profile email}
      # ─── Session ──────────────────────────────────────────────────────
      SESSION_COOKIE_NAME: ${SESSION_COOKIE_NAME:-sid}
      COOKIE_SECURE: ${COOKIE_SECURE:-}
      PUBLIC_PORTAL_URL: "${PUBLIC_PROTOCOL:-http}://${PUBLIC_HOST:-localhost}:${PORTAL_PORT:-3100}"
      SESSION_TTL_SECONDS: ${SESSION_TTL_SECONDS:-43200}
      # SESSION_KEY signs the short-lived OIDC handshake cookie. Generate
      # with `openssl rand -hex 32` and store in .env. Must be ≥32 chars.
      SESSION_KEY: ${SESSION_KEY:?SESSION_KEY must be set in .env}
      # ─── Redis (BFF session store) ────────────────────────────────────
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    ports:
      - "3100:3000"   # host 3100 → container 3000 (avoids clashes with `pnpm dev` on 3000)
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      api:
        condition: service_healthy

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    image: aggregator-dpg/api:dev
    container_name: aggregator-api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: "4000"
      HOST: "0.0.0.0"
      LOG_LEVEL: ${LOG_LEVEL:-info}
      CORS_ORIGINS: "${PUBLIC_PROTOCOL:-http}://${PUBLIC_HOST:-localhost}:${PORTAL_PORT:-3100}"
      DATABASE_URL: postgres://${POSTGRES_USER:-aggregator}:${POSTGRES_PASSWORD:-aggregator-dev}@postgres:5432/${POSTGRES_DB:-aggregator}
      RUN_MIGRATIONS_ON_BOOT: "true"
      # Keycloak admin (service account)
      # Must match the issuer claim on tokens minted by KC. Keep aligned
      # with KC_HOSTNAME so JWT validation in the API succeeds.
      KEYCLOAK_URL: ${KEYCLOAK_URL:-http://keycloak:${KC_PORT:-8080}}
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-aggregator}
      KEYCLOAK_ADMIN_CLIENT_ID: ${KEYCLOAK_ADMIN_CLIENT_ID:-aggregator-api}
      KEYCLOAK_ADMIN_CLIENT_SECRET: ${KEYCLOAK_ADMIN_CLIENT_SECRET:-}
      # Mailer — `smtp` (default, points at MailHog in compose) or `ses`
      MAIL_PROVIDER: ${MAIL_PROVIDER:-smtp}
      SMTP_HOST: ${SMTP_HOST:-mailhog}
      SMTP_PORT: ${SMTP_PORT:-1025}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-no-reply@bluedots.local}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      AWS_REGION: ${AWS_REGION:-ap-south-1}
      SES_FROM: ${SES_FROM:-}
      SES_CONFIGURATION_SET: ${SES_CONFIGURATION_SET:-}
      # Approval flow
      APPROVAL_TOKEN_SECRET: ${APPROVAL_TOKEN_SECRET:?APPROVAL_TOKEN_SECRET must be set in .env (≥32 chars)}
      ADMIN_EMAILS: ${ADMIN_EMAILS:-admin@bluedots.local}
      PUBLIC_API_URL: "${PUBLIC_PROTOCOL:-http}://${PUBLIC_HOST:-localhost}:${API_PORT:-4000}"
      PUBLIC_PORTAL_URL: "${PUBLIC_PROTOCOL:-http}://${PUBLIC_HOST:-localhost}:${PORTAL_PORT:-3100}"
      # ─── Object storage (bulk uploads + QR PNGs + errors.csv) ────────
      # The pre-signed PUT URL is generated server-side and used by the
      # browser; the host of the signed URL must be reachable from the
      # browser. S3_PUBLIC_ENDPOINT lets the API mint URLs against
      # localhost:9000 while internal calls (HEAD, GetObject) go via
      # the docker DNS name `minio:9000`.
      S3_ENDPOINT: ${S3_ENDPOINT:-http://minio:9000}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_BUCKET: ${S3_BUCKET:-aggregator-bulk-uploads}
      S3_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minioadmin}
      S3_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD must be set in .env}
      S3_FORCE_PATH_STYLE: "true"
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      BULK_UPLOAD_URL_TTL_SECONDS: ${BULK_UPLOAD_URL_TTL_SECONDS:-900}
      BULK_UPLOAD_MAX_BYTES: ${BULK_UPLOAD_MAX_BYTES:-10485760}
      QR_DOWNLOAD_URL_TTL_SECONDS: ${QR_DOWNLOAD_URL_TTL_SECONDS:-900}
      PUBLIC_LINK_BASE_URL: ${PUBLIC_LINK_BASE_URL:-http://localhost:3100/r}
      SCHEMA_ROOT_DIR: /app/config/schemas
    ports:
      - "4000:4000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:4000/health/ready || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      mailhog:
        condition: service_healthy

  # Uncomment once the bulk-upload worker is built:
  #
  # worker:
  #   build:
  #     context: .
  #     dockerfile: apps/api/Dockerfile        # same codebase, different entry
  #   image: aggregator-dpg/worker:dev
  #   container_name: aggregator-worker
  #   restart: unless-stopped
  #   command: ["node", "dist/worker.js"]
  #   environment:
  #     NODE_ENV: production
  #     DATABASE_URL: postgres://${POSTGRES_USER:-aggregator}:${POSTGRES_PASSWORD:-aggregator-dev}@postgres:5432/${POSTGRES_DB:-aggregator}
  #     REDIS_URL: redis://redis:6379
  #     S3_ENDPOINT: http://minio:9000
  #     S3_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
  #     S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
  #     LOG_LEVEL: ${LOG_LEVEL:-info}
  #   depends_on:
  #     postgres:        { condition: service_healthy }
  #     redis:           { condition: service_healthy }
  #     minio:           { condition: service_healthy }

volumes:
  postgres-data:
  redis-data:
  minio-data:
