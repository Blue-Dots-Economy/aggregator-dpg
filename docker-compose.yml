name: aggregator-dpg

# Local-dev stack for the Blue Dots Aggregator Portal.
#
# Foundations: Postgres, Redis, MinIO, Keycloak, MailHog.
# Apps:        web (Next.js).  api + worker placeholders are commented in once
#              those services exist (see apps/api stub).
#
# Quick start:
#   cp .env.example .env
#   docker compose up -d
#   docker compose logs -f web
#
# URLs (after `up`) — all browser-facing services proxied through nginx:80:
#   Web app           : http://localhost/
#   API               : http://localhost/backend/
#   Keycloak          : http://localhost/auth/     admin / ${KC_BOOTSTRAP_ADMIN_PASSWORD}
#   MinIO console     : http://localhost/minio/    ${MINIO_ROOT_USER} / ${MINIO_ROOT_PASSWORD}
#   MinIO S3 API      : http://localhost/s3/
#   MailHog UI        : http://localhost/mail/     (captures every outbound email)
#   Postgres          : localhost:5433             aggregator / ${POSTGRES_PASSWORD}  (direct, dev-only)
#   Redis             : localhost:6379                                                (direct, dev-only)
#
# Email delivery is intentionally not part of the local stack. Configure SMTP
# externally (Keycloak realm SMTP settings, API SMTP env vars) when needed.

services:
  # ─────────────────────────────────────────────────────────────────────────
  # Foundations
  # ─────────────────────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    container_name: aggregator-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-aggregator}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aggregator-dev}
      POSTGRES_DB: ${POSTGRES_DB:-aggregator}
    ports:
      - "5433:5432"   # host 5433 → container 5432 (avoids clashes with a system Postgres on 5432)
    volumes:
      - /data/postgres:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aggregator} -d ${POSTGRES_DB:-aggregator}"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: aggregator-redis
    restart: unless-stopped
    command: ["redis-server", "--save", "60", "1", "--loglevel", "warning"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  mailhog:
    image: mailhog/mailhog:v1.0.1
    container_name: aggregator-mailhog
    restart: unless-stopped
    # SMTP (1025) reached over docker network by api/keycloak; UI (8025) proxied via nginx /mail/.
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8025/api/v2/messages"]
      interval: 10s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2024-12-13T22-19-12Z
    container_name: aggregator-minio
    restart: unless-stopped
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      # MINIO_SERVER_URL / MINIO_BROWSER_REDIRECT_URL deliberately unset.
      # MinIO 2024+ rejects path components in those URLs, and SigV4 signing
      # is incompatible with nginx prefix-stripping at /s3/. Until we have a
      # dedicated subdomain (e.g. minio.example.com), MinIO stays
      # internal-only — reachable from other services via docker DNS at
      # minio:9000 (S3) and minio:9001 (console). See infra/nginx/nginx.conf
      # for the /minio/ and /s3/ blocks (kept for future subdomain wiring).
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 3s
      retries: 10

  keycloak:
    image: quay.io/keycloak/keycloak:26.5.5
    container_name: aggregator-keycloak
    restart: unless-stopped
    # build: re-bake plugin into the official image so providers/ is on classpath
    # AND `kc.sh build` has already indexed our SPIs. render-realm.sh substitutes
    # __PUBLIC_BASE_URL__ in the realm JSON before exec'ing kc.sh start-dev
    # --import-realm.
    entrypoint: ["/opt/keycloak/render-realm.sh"]
    command: ["start-dev", "--import-realm"]
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KC_BOOTSTRAP_ADMIN_USERNAME:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KC_BOOTSTRAP_ADMIN_PASSWORD:-admin}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: ${POSTGRES_USER:-aggregator}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD:-aggregator-dev}
      KC_HOSTNAME: ${PUBLIC_HOST:-keycloak}
      # Substituted into realm JSON at boot (clients[].redirectUris,
      # webOrigins, post.logout.redirect.uris). Must be the browser-facing
      # base URL — same value the web/api services use to derive OIDC_ISSUER.
      PUBLIC_BASE_URL: "${PUBLIC_PROTOCOL:-http}://${PUBLIC_HOST:-localhost}"
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
      KC_HEALTH_ENABLED: "true"
      # Behind nginx: serve under /auth/ subpath and trust X-Forwarded-* from the proxy.
      KC_HTTP_RELATIVE_PATH: /auth
      KC_PROXY_HEADERS: xforwarded
      # SMS provider — use 'log' for local dev (writes OTP to keycloak logs).
      # Switch to 'twilio' or 'sns' in .env once creds are configured.
      KC_SPI_SMS_PROVIDER: ${KC_SPI_SMS_PROVIDER:-log}
      # Twilio (only used when KC_SPI_SMS_PROVIDER=twilio)
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:-}
      TWILIO_FROM_NUMBER: ${TWILIO_FROM_NUMBER:-}
      # AWS SNS (only used when KC_SPI_SMS_PROVIDER=sns)
      AWS_REGION: ${AWS_REGION:-ap-south-1}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      # SMTP for email OTP — populate in .env to enable email channel.
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_FROM: ${SMTP_FROM:-no-reply@example.com}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
    # No host port mapping — exposed only via nginx at /auth/.
    volumes:
      - ./infra/keycloak/realms:/opt/keycloak/data/import-template:ro
      - ./infra/keycloak/providers:/opt/keycloak/providers:ro
      - ./infra/keycloak/render-realm.sh:/opt/keycloak/render-realm.sh:ro
    # render-realm.sh writes substituted realm JSON here on each boot. tmpfs
    # keeps the host tree clean and ensures stale renders never persist.
    tmpfs:
      - /opt/keycloak/data/import:uid=1000,gid=0,mode=0775
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      # KC_HTTP_RELATIVE_PATH=/auth applies to the management interface too,
      # so the readiness endpoint moved from /health/ready → /auth/health/ready.
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/9000 && echo -e 'GET /auth/health/ready HTTP/1.1\\r\\nhost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && head -1 <&3 | grep -q '200'"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s

  # ─────────────────────────────────────────────────────────────────────────
  # Apps
  # ─────────────────────────────────────────────────────────────────────────

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    image: aggregator-dpg/web:dev
    container_name: aggregator-web
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
      # All browser-visible URLs go through nginx on :80 — no service port suffixes.
      NEXT_PUBLIC_API_URL: "${PUBLIC_PROTOCOL:-http}://${PUBLIC_HOST:-localhost}/backend"
      API_BASE_URL: ${API_BASE_URL:-http://api:4000}
      # ─── OIDC (Authorization Code + PKCE) ────────────────────────────
      # OIDC_ISSUER must resolve identically from the browser AND the web
      # container. With nginx as the sole ingress, both reach Keycloak via
      # http://${PUBLIC_HOST}/auth/realms/${realm}. The web container's
      # back-channel call is short-circuited to the docker host gateway via
      # the `extra_hosts` mapping below.
      OIDC_ISSUER: "${PUBLIC_PROTOCOL:-http}://${PUBLIC_HOST:-localhost}/auth/realms/${KEYCLOAK_REALM:-aggregator}"
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID:-aggregator-portal}
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET:-}
      OIDC_REDIRECT_URI: "${PUBLIC_PROTOCOL:-http}://${PUBLIC_HOST:-localhost}/api/auth/callback"
      OIDC_POST_LOGOUT_REDIRECT_URI: "${PUBLIC_PROTOCOL:-http}://${PUBLIC_HOST:-localhost}/"
      OIDC_SCOPE: ${OIDC_SCOPE:-openid profile email}
      # ─── BFF service token (anonymous-proxy routes like /api/aggregator/register) ──
      # The web BFF mints a Keycloak service-account token via the
      # `aggregator-api` client to authorise upstream calls made on behalf of
      # an unauthenticated browser. Reuses the same client/secret the api
      # service already has so .env carries one pair, not two.
      BFF_SERVICE_CLIENT_ID: ${KEYCLOAK_ADMIN_CLIENT_ID:-aggregator-api}
      BFF_SERVICE_CLIENT_SECRET: ${KEYCLOAK_ADMIN_CLIENT_SECRET:-aggregator-api-dev-secret-change-me}
      # ─── Session ──────────────────────────────────────────────────────
      SESSION_COOKIE_NAME: ${SESSION_COOKIE_NAME:-sid}
      COOKIE_SECURE: ${COOKIE_SECURE:-}
      PUBLIC_PORTAL_URL: "${PUBLIC_PROTOCOL:-http}://${PUBLIC_HOST:-localhost}"
      SESSION_TTL_SECONDS: ${SESSION_TTL_SECONDS:-43200}
      # SESSION_KEY signs the short-lived OIDC handshake cookie. Generate
      # with `openssl rand -hex 32` and store in .env. Must be ≥32 chars.
      SESSION_KEY: ${SESSION_KEY:?SESSION_KEY must be set in .env}
      # ─── Redis (BFF session store) ────────────────────────────────────
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    # No host port mapping — exposed only via nginx at /.
    # Resolve PUBLIC_HOST (the VM's public IP) to the docker host gateway so
    # the BFF's back-channel OIDC discovery + token exchange reaches nginx via
    # the bridge instead of bouncing through AWS routing.
    extra_hosts:
      - "${PUBLIC_HOST:-localhost}:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      api:
        condition: service_healthy

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    image: aggregator-dpg/api:dev
    container_name: aggregator-api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: "4000"
      HOST: "0.0.0.0"
      LOG_LEVEL: ${LOG_LEVEL:-info}
      CORS_ORIGINS: "${PUBLIC_PROTOCOL:-http}://${PUBLIC_HOST:-localhost}"
      DATABASE_URL: postgres://${POSTGRES_USER:-aggregator}:${POSTGRES_PASSWORD:-aggregator-dev}@postgres:5432/${POSTGRES_DB:-aggregator}
      RUN_MIGRATIONS_ON_BOOT: "true"
      # Keycloak admin (service account). Must equal the public issuer prefix
      # so the JWT `iss` claim matches what `expectedIssuer()` derives from
      # KEYCLOAK_URL (apps/api/src/services/auth/access-token.ts:209).
      KEYCLOAK_URL: "${PUBLIC_PROTOCOL:-http}://${PUBLIC_HOST:-localhost}/auth"
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-aggregator}
      KEYCLOAK_ADMIN_CLIENT_ID: ${KEYCLOAK_ADMIN_CLIENT_ID:-aggregator-api}
      KEYCLOAK_ADMIN_CLIENT_SECRET: ${KEYCLOAK_ADMIN_CLIENT_SECRET:-aggregator-api-dev-secret-change-me}
      # Mailer — `smtp` (default, points at MailHog in compose) or `ses`
      MAIL_PROVIDER: ${MAIL_PROVIDER:-smtp}
      SMTP_HOST: ${SMTP_HOST:-mailhog}
      SMTP_PORT: ${SMTP_PORT:-1025}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-no-reply@bluedots.local}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      AWS_REGION: ${AWS_REGION:-ap-south-1}
      SES_FROM: ${SES_FROM:-}
      SES_CONFIGURATION_SET: ${SES_CONFIGURATION_SET:-}
      # Approval flow
      APPROVAL_TOKEN_SECRET: ${APPROVAL_TOKEN_SECRET:?APPROVAL_TOKEN_SECRET must be set in .env (≥32 chars)}
      ADMIN_EMAILS: ${ADMIN_EMAILS:-admin@bluedots.local}
      PUBLIC_API_URL: "${PUBLIC_PROTOCOL:-http}://${PUBLIC_HOST:-localhost}/backend"
      PUBLIC_PORTAL_URL: "${PUBLIC_PROTOCOL:-http}://${PUBLIC_HOST:-localhost}"
    # No host port mapping — exposed only via nginx at /backend/.
    # See `extra_hosts` rationale on the web service: api hits Keycloak via
    # the public URL for both admin REST + JWKS, so we short-circuit DNS to
    # the host gateway where nginx listens.
    extra_hosts:
      - "${PUBLIC_HOST:-localhost}:host-gateway"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:4000/health/ready || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      mailhog:
        condition: service_healthy

  # Uncomment once the bulk-upload worker is built:
  #
  # worker:
  #   build:
  #     context: .
  #     dockerfile: apps/api/Dockerfile        # same codebase, different entry
  #   image: aggregator-dpg/worker:dev
  #   container_name: aggregator-worker
  #   restart: unless-stopped
  #   command: ["node", "dist/worker.js"]
  #   environment:
  #     NODE_ENV: production
  #     DATABASE_URL: postgres://${POSTGRES_USER:-aggregator}:${POSTGRES_PASSWORD:-aggregator-dev}@postgres:5432/${POSTGRES_DB:-aggregator}
  #     REDIS_URL: redis://redis:6379
  #     S3_ENDPOINT: http://minio:9000
  #     S3_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
  #     S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
  #     LOG_LEVEL: ${LOG_LEVEL:-info}
  #   depends_on:
  #     postgres:        { condition: service_healthy }
  #     redis:           { condition: service_healthy }
  #     minio:           { condition: service_healthy }

  # ─────────────────────────────────────────────────────────────────────────
  # Edge: nginx reverse proxy + Let's Encrypt — single ingress on 80/443.
  #
  # jonasal/nginx-certbot bundles nginx + certbot + auto-renewal. On first
  # boot it generates a self-signed dummy cert so nginx can start, then
  # certbot performs an HTTP-01 challenge (port 80 must be reachable from
  # the public internet) and replaces the dummy with a real LE cert.
  #
  # Two config layers, both included by jonasal's main nginx.conf inside
  # the http {} block:
  #   1. ./infra/nginx/user_conf.d/*.conf      → mounted as-is
  #      (shared http-scope: maps, upstreams, proxy/buffer settings)
  #   2. ./infra/nginx/templates/*.template    → rendered via envsubst at
  #      boot, output to /etc/nginx/conf.d/*.conf (server blocks with
  #      ${PUBLIC_HOST} substituted in server_name + ssl_certificate paths)
  # ─────────────────────────────────────────────────────────────────────────

  nginx:
    image: jonasal/nginx-certbot:5.4.1
    container_name: aggregator-nginx
    restart: unless-stopped
    environment:
      # Required by certbot for cert expiry / abuse notifications.
      CERTBOT_EMAIL: ${CERTBOT_EMAIL:?CERTBOT_EMAIL must be set in .env}
      # USE_LOCAL_CA=1 issues self-signed certs via pebble — useful for
      # smoke-testing the ingress without burning Let's Encrypt rate limits.
      # Set to 0 (or unset) for production.
      USE_LOCAL_CA: ${USE_LOCAL_CA:-0}
      # Substituted into the .template file at boot. Both the SSL listener's
      # server_name and the ssl_certificate paths reference this — keep one
      # source of truth so cert request and TLS listener always agree.
      PUBLIC_HOST: ${PUBLIC_HOST:?PUBLIC_HOST must be set in .env}
      # Restrict envsubst to PUBLIC_HOST only — leaves all $-prefixed nginx
      # variables ($host, $scheme, $remote_addr, etc.) untouched.
      NGINX_ENVSUBST_FILTER: '^PUBLIC_HOST$$'
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/user_conf.d:/etc/nginx/user_conf.d:ro
      - ./infra/nginx/templates:/etc/nginx/templates:ro
      - nginx-letsencrypt:/etc/letsencrypt
    depends_on:
      web:
        condition: service_started
      api:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      minio:
        condition: service_healthy
      mailhog:
        condition: service_healthy

volumes:
  redis-data:
  minio-data:
  # Persists Let's Encrypt account keys + issued certs across container
  # restarts. Wiping this volume forces a fresh ACME registration — be
  # mindful of LE rate limits (5 duplicate certs per week per domain).
  nginx-letsencrypt:
