parent=keycloak.v2

# Brand strings — overridden via Keycloak env vars at container start.
# Defaults match the generic Aggregator label so a misconfigured deploy
# still renders something readable instead of "blue dots" leaking.
brandShortName=${env.BRAND_SHORT_NAME:Aggregator}
brandLongName=${env.BRAND_LONG_NAME:Aggregator Portal}
brandSsoLabel=${env.BRAND_SSO_LABEL:SSO}
heroTitleLead=${env.HERO_TITLE_LEAD:Welcome to}
heroTitleHighlight=${env.HERO_TITLE_HIGHLIGHT:the Aggregator}
heroTitleTail=${env.HERO_TITLE_TAIL:portal.}
heroSubtitle=${env.HERO_SUBTITLE:Sign in to manage participants, registrations, and onboarding for your network.}

# Palette overrides — read by template.ftl's inline <style> block so the
# static blue-dots.css can stay generic. Defaults render the original
# indigo palette; per-network keycloak.env overrides every value.
brandPrimary=${env.BRAND_PRIMARY_COLOR:#4f46e5}
brandPrimaryDark=${env.BRAND_PRIMARY_DARK:#4338ca}
brandPrimary500=${env.BRAND_PRIMARY_500:#6366f1}
brandPrimary100=${env.BRAND_PRIMARY_100:#e0e7ff}
brandPrimary50=${env.BRAND_PRIMARY_50:#eef2ff}
brandHeroBg=${env.BRAND_HERO_BG:#0f172a}
brandHeroGrad=${env.BRAND_HERO_GRAD:#7dd3fc}
