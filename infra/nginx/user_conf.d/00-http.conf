# ─────────────────────────────────────────────────────────────────────────────
# aggregator-dpg edge proxy — http-scope shared config.
#
# Loaded by jonasal/nginx-certbot via include /etc/nginx/user_conf.d/*.conf
# inside the http {} block of its base nginx.conf. So everything here lives
# at http scope: maps, upstreams, shared proxy/buffer settings.
#
# Server blocks (listen 80 / listen 443) live in 10-aggregator.conf.template
# and are envsubst'd at boot to inject ${PUBLIC_HOST}.
# ─────────────────────────────────────────────────────────────────────────────

# ─── WebSocket upgrade plumbing ─────────────────────────────────────────
# Maps the Upgrade header onto the Connection header so proxy_set_header
# below can forward both correctly. Used by Next.js HMR (in dev) and
# MailHog UI.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# ─── Upstreams ──────────────────────────────────────────────────────────
upstream web_upstream            { server web:3000;       keepalive 32; }
upstream api_upstream            { server api:4000;       keepalive 32; }
upstream keycloak_upstream       { server keycloak:8080;  keepalive 32; }
upstream mailhog_upstream        { server mailhog:8025;   keepalive 32; }

# ─── Common proxy header set ───────────────────────────────────────────
proxy_http_version 1.1;
proxy_set_header   Connection        "";

# Allow large uploads — bulk-upload CSVs and other large request bodies
# can exceed the default 1 MiB.
client_max_body_size 1024m;
client_body_buffer_size 1m;

# Auth headers (Keycloak cookies, JWTs) can exceed the default 8k buffer.
# Must live at http/server scope, not inside a location block.
large_client_header_buffers 4 32k;
