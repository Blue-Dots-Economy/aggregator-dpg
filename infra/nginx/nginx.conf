# ─────────────────────────────────────────────────────────────────────────────
# aggregator-dpg edge proxy.
#
# Single ingress on :80 → routes to internal services by URL path prefix.
# All upstream hostnames resolve via the docker compose network DNS.
#
# Path map:
#   /            → web         (Next.js, owns /api/auth/* for OIDC handshake)
#   /backend/    → api         (prefix stripped before hitting backend)
#   /auth/       → keycloak    (KC_HTTP_RELATIVE_PATH=/auth — prefix preserved)
#   /minio/      → minio       (web console, port 9001)
#   /s3/         → minio       (S3 API, port 9000 — prefix stripped)
#   /mail/       → mailhog UI  (see gotchas re: subpath asset URLs)
# ─────────────────────────────────────────────────────────────────────────────

user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log notice;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';
    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    keepalive_timeout  65;

    # ─── WebSocket upgrade plumbing ─────────────────────────────────────────
    # Maps the Upgrade header onto the Connection header so proxy_set_header
    # below can forward both correctly. Used by Next.js HMR (in dev), MinIO
    # console, and MailHog UI.
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # ─── Upstreams ──────────────────────────────────────────────────────────
    upstream web_upstream            { server web:3000;       keepalive 32; }
    upstream api_upstream            { server api:4000;       keepalive 32; }
    upstream keycloak_upstream       { server keycloak:8080;  keepalive 32; }
    upstream minio_console_upstream  { server minio:9001;     keepalive 32; }
    upstream minio_s3_upstream       { server minio:9000;     keepalive 32; }
    upstream mailhog_upstream        { server mailhog:8025;   keepalive 32; }

    # ─── Common proxy header set ───────────────────────────────────────────
    # Reused via `include` directives below would be cleaner, but inlined here
    # to keep the config single-file and self-documenting.
    proxy_http_version 1.1;
    proxy_set_header   Connection        "";

    # Allow large uploads — MinIO multipart parts can exceed default 1 MiB.
    client_max_body_size 1024m;
    client_body_buffer_size 1m;

    # Auth headers (Keycloak cookies, JWTs) can exceed the default 8k buffer.
    # Must live at http/server scope, not inside a location block.
    large_client_header_buffers 4 32k;

    server {
        listen 80 default_server;
        server_name _;

        # Health probe for any external load balancer in front of this proxy.
        location = /healthz {
            access_log off;
            add_header Content-Type text/plain;
            return 200 "ok\n";
        }

        # ─── /backend/ → api (strip prefix) ─────────────────────────────────
        # Trailing slash on proxy_pass URI strips the matched location prefix
        # before forwarding upstream. So `/backend/health/ready` → `/health/ready`.
        location /backend/ {
            proxy_pass http://api_upstream/;

            proxy_set_header Host               $host;
            proxy_set_header X-Real-IP          $remote_addr;
            proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto  $scheme;
            proxy_set_header X-Forwarded-Host   $host;
            proxy_set_header X-Forwarded-Prefix /backend;

            proxy_read_timeout  300s;
            proxy_send_timeout  300s;
        }

        # ─── /auth/ → keycloak (preserve prefix) ────────────────────────────
        # No trailing slash on proxy_pass → request URI passed through verbatim.
        # Keycloak listens at /auth/* because KC_HTTP_RELATIVE_PATH=/auth is set.
        # Auth flows produce large cookies / JWTs → bigger proxy buffers.
        location /auth/ {
            proxy_pass http://keycloak_upstream;

            proxy_set_header Host               $host;
            proxy_set_header X-Real-IP          $remote_addr;
            proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto  $scheme;
            proxy_set_header X-Forwarded-Host   $host;
            proxy_set_header X-Forwarded-Port   $server_port;

            # Auth header / token sizes can be large — bump upstream buffers.
            proxy_buffer_size           32k;
            proxy_buffers               8 32k;
            proxy_busy_buffers_size     64k;

            proxy_read_timeout  120s;
            proxy_send_timeout  120s;
        }

        # ─── /minio/ → MinIO web console ────────────────────────────────────
        # Console is a SPA + websocket; MINIO_BROWSER_REDIRECT_URL set on the
        # service tells the SPA its public origin so SSO/login redirects come
        # back to /minio/ instead of bare :9001.
        location /minio/ {
            proxy_pass http://minio_console_upstream/;

            proxy_set_header Host               $host;
            proxy_set_header X-Real-IP          $remote_addr;
            proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto  $scheme;

            # WebSocket for the live console.
            proxy_http_version 1.1;
            proxy_set_header Upgrade            $http_upgrade;
            proxy_set_header Connection         $connection_upgrade;

            chunked_transfer_encoding off;
            proxy_buffering            off;
            proxy_request_buffering    off;
            proxy_read_timeout         600s;
        }

        # ─── /s3/ → MinIO S3 API (strip prefix) ─────────────────────────────
        # Trailing slash strips /s3/ before forwarding so SDK PUT/GET hits
        # `/{bucket}/{key}` upstream. SigV4 signatures must be computed against
        # the path the client sends — see gotchas about MINIO_SERVER_URL.
        location /s3/ {
            proxy_pass http://minio_s3_upstream/;

            proxy_set_header Host               $host;
            proxy_set_header X-Real-IP          $remote_addr;
            proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto  $scheme;

            # Critical for streaming uploads / large objects.
            proxy_buffering            off;
            proxy_request_buffering    off;
            chunked_transfer_encoding  off;
            proxy_connect_timeout      300s;
            proxy_read_timeout         600s;
            proxy_send_timeout         600s;
        }

        # ─── /mail/ → MailHog UI ────────────────────────────────────────────
        # MailHog has no native subpath support — its assets reference `/css/...`
        # and its WebSocket connects to `/api/v2/websocket`. The UI works at
        # /mail/ for the initial document fetch but breaks on assets. For dev
        # use, prefer SSH tunnel (-L 8025:mailhog:8025) or temporarily re-add
        # `8025:8025` to the mailhog service.
        location /mail/ {
            proxy_pass http://mailhog_upstream/;

            proxy_set_header Host               $host;
            proxy_set_header X-Real-IP          $remote_addr;
            proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto  $scheme;

            proxy_http_version 1.1;
            proxy_set_header Upgrade            $http_upgrade;
            proxy_set_header Connection         $connection_upgrade;
        }

        # ─── / → web (Next.js BFF, default route) ───────────────────────────
        # Catch-all: must come last. Owns /api/auth/* (OIDC handshake routes).
        location / {
            proxy_pass http://web_upstream;

            proxy_set_header Host               $host;
            proxy_set_header X-Real-IP          $remote_addr;
            proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto  $scheme;
            proxy_set_header X-Forwarded-Host   $host;

            # Next.js streaming / SSE / HMR.
            proxy_http_version 1.1;
            proxy_set_header Upgrade            $http_upgrade;
            proxy_set_header Connection         $connection_upgrade;

            proxy_read_timeout  120s;
        }
    }
}
