apiVersion: v1
kind: Service
metadata:
  name: otel-collector
spec:
  type: {{ .Values.service.type }}
  selector:
    app: {{ .Release.Name }}-otel-collector
  ports:
    - { name: grpc, port: {{ .Values.service.ports.grpc }}, targetPort: grpc }
    - { name: http, port: {{ .Values.service.ports.http }}, targetPort: http }
    - { name: prometheus, port: {{ .Values.service.ports.prometheus }}, targetPort: prometheus }
