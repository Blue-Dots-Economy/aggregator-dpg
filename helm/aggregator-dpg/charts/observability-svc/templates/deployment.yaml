apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-observability-svc
  labels:
    helm.sh/chart: {{ printf "%s-%s" .Chart.Name .Chart.Version | replace "+" "_" | trunc 63 | trimSuffix "-" }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/part-of: aggregator-dpg
    app.kubernetes.io/name: aggregator-dpg
    app.kubernetes.io/component: observability-svc
    app.kubernetes.io/version: {{ .Chart.AppVersion | quote }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: aggregator-dpg
      app.kubernetes.io/component: observability-svc
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: aggregator-dpg
        app.kubernetes.io/component: observability-svc
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds }}
      containers:
        - name: observability-svc
          image: '{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}'
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: APP_VERSION
              value: '{{ .Values.telemetry.appVersion | default .Chart.AppVersion }}'
            - name: REDIS_URL
              value: '{{ .Values.redisUrl }}'
            - name: IDEM_TTL_DAYS
              value: '{{ .Values.idemTtlDays }}'
            - name: OUTCOMES_HMAC_SECRETS_JSON
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.hmacSecretsSecret }}
                  key: secrets-json
            - name: ADMIN_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.adminTokenSecret }}
                  key: token
            - name: OUTCOME_METRICS_JSON
              value: |-
                {{ .Values.outcomeMetricsJson | nindent 16 }}
            - name: OTEL_SDK_DISABLED
              value: '{{ ternary "false" "true" .Values.telemetry.enabled }}'
            - name: OTEL_COLLECTOR_ENDPOINT
              value: '{{ .Values.telemetry.otel.collectorEndpoint }}'
            - name: OTEL_SAMPLE_RATE
              value: '{{ .Values.telemetry.otel.sampleRate }}'
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            periodSeconds: 10
          resources:
            requests:
              cpu: '50m'
              memory: '128Mi'
            limits:
              cpu: '500m'
              memory: '512Mi'
