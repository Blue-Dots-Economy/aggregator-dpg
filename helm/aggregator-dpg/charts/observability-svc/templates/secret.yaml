# Secrets are managed externally — DO NOT define them in this chart.
#
# Create them before `helm install`:
#
#   kubectl create secret generic aggregator-obs-secrets \
#     --from-literal=secrets-json='{"svc-api":"...","svc-worker":"..."}'
#
#   kubectl create secret generic aggregator-obs-admin-token \
#     --from-literal=token='...'
#
# The deployment references them via valueFrom.secretKeyRef in deployment.yaml.
# Both secret refs are required (optional: false) — the pod will not start
# without them. HMAC authentication is non-negotiable for outcome events.
