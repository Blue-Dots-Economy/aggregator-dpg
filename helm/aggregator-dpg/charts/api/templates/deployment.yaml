apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "api.fullname" . }}
  labels:
    {{- include "api.labels" . | nindent 4 }}
spec:
  {{- if not .Values.hpa.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "api.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "api.selectorLabels" . | nindent 8 }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
    spec:
      serviceAccountName: {{ include "api.serviceAccountName" . }}
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds }}
      {{- include "api.imagePullSecrets" . | nindent 6 }}
      {{- include "api.hostAliases" . | nindent 6 }}
      containers:
        - name: api
          image: {{ include "api.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "api.globalConfigMap" . }}
            - configMapRef:
                name: {{ include "api.appConfigMap" . }}
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "api.secretName" . }}
                  key: POSTGRES_PASSWORD
            # POSTGRES_USER + POSTGRES_DB + POSTGRES_HOST come from the
            # umbrella's `{release}-global` ConfigMap (envFrom above).
            - name: DATABASE_URL
              value: "postgres://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@$(POSTGRES_HOST):5432/$(POSTGRES_DB)"
            - name: KEYCLOAK_ADMIN_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "api.secretName" . }}
                  key: KEYCLOAK_ADMIN_CLIENT_SECRET
            - name: APPROVAL_TOKEN_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "api.secretName" . }}
                  key: APPROVAL_TOKEN_SECRET
            - name: SMTP_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "api.secretName" . }}
                  key: SMTP_USER
                  optional: true
            - name: SMTP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "api.secretName" . }}
                  key: SMTP_PASSWORD
                  optional: true
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: {{ include "api.secretName" . }}
                  key: AWS_ACCESS_KEY_ID
                  optional: true
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "api.secretName" . }}
                  key: AWS_SECRET_ACCESS_KEY
                  optional: true
            - name: APP_VERSION
              value: '{{ .Values.telemetry.appVersion | default .Chart.AppVersion }}'
            - name: OTEL_SDK_DISABLED
              value: '{{ ternary "false" "true" .Values.telemetry.enabled }}'
            - name: OTEL_COLLECTOR_ENDPOINT
              value: '{{ .Values.telemetry.otel.collectorEndpoint }}'
            - name: OTEL_SAMPLE_RATE
              value: '{{ .Values.telemetry.otel.sampleRate }}'
            - name: OTEL_EXPORT_INTERVAL_MS
              value: '{{ .Values.telemetry.otel.exportIntervalMs }}'
            - name: OTEL_ATTRIBUTE_VALUE_LENGTH_LIMIT
              value: '{{ .Values.telemetry.otel.attributeValueLengthLimit }}'
            - name: OBS_SVC_URL
              value: '{{ .Values.telemetry.observabilitySvc.url }}'
            - name: OBS_HMAC_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: aggregator-obs-secrets
                  key: hmac-key-id
                  optional: true
            - name: OBS_HMAC_SECRET
              valueFrom:
                secretKeyRef:
                  name: aggregator-obs-secrets
                  key: hmac-secret
                  optional: true
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 5
          startupProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 30
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
