apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "web.fullname" . }}
  labels:
    {{- include "web.labels" . | nindent 4 }}
spec:
  {{- if not .Values.hpa.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "web.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "web.selectorLabels" . | nindent 8 }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
    spec:
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds }}
      {{- include "web.imagePullSecrets" . | nindent 6 }}
      {{- include "web.hostAliases" . | nindent 6 }}
      containers:
        - name: web
          image: {{ include "web.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "web.globalConfigMap" . }}
            - configMapRef:
                name: {{ include "web.appConfigMap" . }}
          env:
            - name: SESSION_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "web.secretName" . }}
                  key: SESSION_KEY
            - name: OIDC_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "web.secretName" . }}
                  key: OIDC_CLIENT_SECRET
            - name: BFF_SERVICE_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "web.secretName" . }}
                  key: BFF_SERVICE_CLIENT_SECRET
            - name: APP_VERSION
              value: '{{ .Values.telemetry.appVersion | default .Chart.AppVersion }}'
            - name: OTEL_SDK_DISABLED
              value: '{{ ternary "false" "true" .Values.telemetry.enabled }}'
            - name: OTEL_COLLECTOR_ENDPOINT
              value: '{{ .Values.telemetry.otel.collectorEndpoint }}'
            - name: OTEL_SAMPLE_RATE
              value: '{{ .Values.telemetry.otel.sampleRate }}'
            - name: OTEL_EXPORT_INTERVAL_MS
              value: '{{ .Values.telemetry.otel.exportIntervalMs }}'
            - name: OTEL_ATTRIBUTE_VALUE_LENGTH_LIMIT
              value: '{{ .Values.telemetry.otel.attributeValueLengthLimit }}'
            - name: OBS_SVC_URL
              value: '{{ .Values.telemetry.observabilitySvc.url }}'
            - name: OBS_HMAC_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: aggregator-obs-secrets
                  key: hmac-key-id
                  optional: true
            - name: OBS_HMAC_SECRET
              valueFrom:
                secretKeyRef:
                  name: aggregator-obs-secrets
                  key: hmac-secret
                  optional: true
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 5
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
