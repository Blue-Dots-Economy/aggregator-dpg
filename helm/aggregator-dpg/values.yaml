# ═══════════════════════════════════════════════════════════════════════════
# aggregator-dpg umbrella chart — single values file (dev + prod).
#
# Defaults are dev-safe. For any deployment, review every line tagged
# `# UPDATE:` and override via:
#   1. Editing this file directly (single-cluster / dev), OR
#   2. `helm upgrade ... --set key=value` (CI / per-deploy overrides), OR
#   3. A vaulted Secret pointed to by `global.existingSecret` (prod).
# ═══════════════════════════════════════════════════════════════════════════

global:
  # UPDATE: public FQDN that ingress + KC issuer + email links use.
  publicHost: bluedots-aggregator.duckdns.org
  # UPDATE: http for local, https when cert-manager issues a cert.
  publicProtocol: https

  # UPDATE: container registry. Empty = images use their `repository` as-is
  # (Docker Hub). For GHCR/ECR set e.g. `ghcr.io/your-org`.
  imageRegistry: ""
  imagePullSecrets: []

  # UPDATE: cluster storage class for PVCs. EKS = "gp3", kind/minikube = "".
  storageClass: ""

  keycloakRealm: aggregator

  oidc:
    clientId: aggregator-portal
    scope: "openid profile email"

  # UPDATE: S3 wiring for bulk uploads, QR PNGs, error CSVs.
  s3:
    region: ap-south-1
    bucket: aggregator-bulk-uploads
    forcePathStyle: false

  # UPDATE (prod): point at an externally-managed Secret (SealedSecrets,
  # ExternalSecretsOperator, SOPS, Vault). Must carry every key listed under
  # `secrets:` below. Empty => umbrella renders its own Secret from `secrets:`.
  existingSecret: ""

  # Workaround for compose `extra_hosts: PUBLIC_HOST:host-gateway`. Add an
  # entry per app pod so server-side OIDC discovery doesn't bounce through
  # external DNS. Usually empty in cloud clusters.
  hostAliases: []

  # UPDATE: debug for local, info for prod.
  appLogLevel: debug

# ─── Ingress (single host, multi-path) ─────────────────────────────────────
ingress:
  enabled: true
  className: nginx
  # UPDATE: cert-manager ClusterIssuer. Empty disables TLS issuance.
  clusterIssuer: letsencrypt-prod
  # UPDATE: ACME registration email for Let's Encrypt account.
  acmeEmail: ops@sanketika.in
  # Prod-grade nginx annotations — shared by both Ingress objects (api + main).
  annotations:
    # TLS / HSTS
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/hsts: "true"
    nginx.ingress.kubernetes.io/hsts-include-subdomains: "false"
    nginx.ingress.kubernetes.io/hsts-max-age: "15724800"
    # Body size — bulk CSV / QR uploads
    nginx.ingress.kubernetes.io/proxy-body-size: "1024m"
    # Timeouts — long migrations, bulk jobs, SSE
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
    # Proxy buffers — KC tokens + Next.js streaming
    nginx.ingress.kubernetes.io/proxy-buffer-size: "32k"
    nginx.ingress.kubernetes.io/proxy-buffers-number: "8"
    nginx.ingress.kubernetes.io/proxy-busy-buffers-size: "64k"
    # Upstream protocol
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
    nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
    # Compression
    nginx.ingress.kubernetes.io/enable-brotli: "true"

# ─── Secrets ───────────────────────────────────────────────────────────────
# All values land in Secret `<release>-secrets`. For prod, set
# `global.existingSecret` and skip this block — values here are ignored.
secrets:
  existingSecret: ""
  # UPDATE: every value below before any non-throwaway deploy.
  postgresPassword: aggregator-dev
  kcBootstrapAdminPassword: kc-admin-dev
  keycloakAdminClientSecret: aggregator-api-dev-secret
  approvalTokenSecret: dev-approval-token-secret-32chars-min
  sessionKey: dev-session-key-32-chars-minimum-okay
  oidcClientSecret: aggregator-portal-dev-secret
  bffServiceClientSecret: ""          # empty => falls back to keycloakAdminClientSecret
  # UPDATE: inject at deploy time, do NOT commit real values.
  #   helm upgrade ... --set secrets.smtpUser=you@example.com \
  #                    --set secrets.smtpPassword='xxxx xxxx xxxx xxxx'
  smtpUser: "CHANGE_ME"
  smtpPassword: "CHANGE_ME"
  twilioAccountSid: ""
  twilioAuthToken: ""
  twilioFromNumber: ""
  # Leave AWS keys empty when using IRSA / Pod Identity on EKS.
  awsAccessKeyId: ""
  awsSecretAccessKey: ""

# ─── Mail wiring (shared by api + keycloak) ────────────────────────────────
mail:
  # UPDATE: smtp | ses
  provider: smtp
  smtp:
    # UPDATE: SMTP relay. For Gmail use smtp.gmail.com:587 STARTTLS + App Password.
    host: smtp.gmail.com
    port: 587
    # UPDATE: sender address (must be a verified identity for SES/SendGrid).
    from: abhishekg@sanketika.in
    fromDisplay: "Blue Dots Aggregator"
    secure: false
    starttls: true
    auth: true
  ses:
    # UPDATE (if provider=ses): verified SES sender + configuration set.
    from: ""
    configurationSet: ""

# ─── App subcharts ─────────────────────────────────────────────────────────
web:
  # UPDATE: bump for prod (2-3 replicas typical). HPA below scales further.
  replicaCount: 1
  image:
    # UPDATE: registry path + tag.
    repository: docker.io/vinodbbhorge/aggregator-dpg-web
    tag: v1.0.0
    pullPolicy: IfNotPresent
  service:
    port: 3000
  resources:
    requests: { cpu: 100m, memory: 256Mi }
    limits:   { cpu: 1,    memory: 1Gi   }
  # UPDATE (prod): enable HPA for autoscaling.
  hpa:
    enabled: false
    minReplicas: 2
    maxReplicas: 6
    targetCPU: 70

api:
  replicaCount: 1
  image:
    # UPDATE: registry path + tag.
    repository: docker.io/vinodbbhorge/aggregator-dpg-api
    tag: v1.0.0
    pullPolicy: IfNotPresent
  service:
    port: 4000
  resources:
    requests: { cpu: 200m, memory: 512Mi }
    limits:   { cpu: 2,    memory: 1Gi   }
  runMigrationsOnBoot: true
  bulk:
    uploadUrlTtlSeconds: 900
    uploadMaxBytes: 10485760
    qrDownloadUrlTtlSeconds: 900
  # UPDATE: comma-separated admin notification recipients.
  adminEmails: "admin@bluedots.local"
  publicLinkBaseUrl: ""              # empty => derived from global.publicProtocol+publicHost
  serviceAccount:
    create: true
    # UPDATE (EKS prod): IRSA role for S3/SES.
    #   annotations:
    #     eks.amazonaws.com/role-arn: arn:aws:iam::<acct>:role/aggregator-api
    annotations: {}
  hpa:
    enabled: false
    minReplicas: 2
    maxReplicas: 6
    targetCPU: 70

worker:
  replicaCount: 1
  image:
    # UPDATE: registry path + tag.
    repository: docker.io/vinodbbhorge/aggregator-dpg-worker
    tag: v1.0.0
    pullPolicy: IfNotPresent
  resources:
    requests: { cpu: 100m, memory: 384Mi }
    limits:   { cpu: 1,    memory: 1Gi   }
  bulk:
    maxRows: 10000
    maxRowBytes: 65536
  cron:
    linkMetricsRollupIntervalMs: 300000
    watchdogIntervalMs: 3600000
  serviceAccount:
    create: true
    # UPDATE (EKS prod): IRSA role for S3/SES.
    annotations: {}

keycloak:
  replicaCount: 1
  image:
    # UPDATE: registry path + tag.
    repository: docker.io/vinodbbhorge/aggregator-dpg-keycloak
    tag: v1.0.0
    pullPolicy: IfNotPresent
  # Set true when the image was built with `kc.sh build` matching all
  # build-time SPI options (faster cold start). Current v1.0.0 image lacks
  # KC_SPI_SMS_PROVIDER baked in → keep false until image is rebuilt.
  optimized: false
  bootstrapAdminUsername: admin
  # UPDATE: log | twilio | sns
  smsProvider: log
  awsRegion: ap-south-1
  service:
    port: 8080
    mgmtPort: 9000
  resources:
    requests: { cpu: 250m, memory: 768Mi }
    limits:   { cpu: 1,    memory: 1500Mi }

# ─── ingress-nginx subchart (cluster-level controller) ────────────────────
# UPDATE: set enabled=false if cluster already has ingress-nginx installed.
ingress-nginx:
  enabled: true
  controller:
    publishService:
      enabled: true
    service:
      type: LoadBalancer

# ─── cert-manager subchart (cluster-level controller) ─────────────────────
# UPDATE: set enabled=false if cluster already has cert-manager installed.
cert-manager:
  enabled: true
  crds:
    enabled: true
  # cert-manager schema expects integer logLevel (1-5). Override umbrella's
  # string `global.logLevel` so subchart values pass schema validation.
  global:
    logLevel: 2

# ─── Bitnami postgresql subchart values (consumed verbatim) ────────────────
# See: https://artifacthub.io/packages/helm/bitnami/postgresql
postgresql:
  enabled: true
  # UPDATE: Bitnami's free `postgresql` chart now requires a paid subscription
  # for the official image; `bitnamilegacy/*` mirrors the last freely-licensed
  # tags. Override here if you have a paid Bitnami license.
  image:
    registry: docker.io
    repository: bitnamilegacy/postgresql
    tag: 17.6.0
  auth:
    username: aggregator
    database: aggregator
    # Wire to the umbrella-rendered Secret so app + keycloak share creds.
    # If using global.existingSecret, point this at the same Secret name.
    existingSecret: aggregator-secrets
    secretKeys:
      adminPasswordKey: postgres-password
      userPasswordKey: password
  primary:
    persistence:
      enabled: true
      # UPDATE: bump for prod (50Gi+ typical).
      size: 2Gi
    initdb:
      scripts:
        01-create-keycloak-db.sql: |
          CREATE DATABASE keycloak OWNER aggregator;
    resources:
      requests: { cpu: 250m, memory: 512Mi }
      limits:   { cpu: 2,    memory: 2Gi   }

# ─── Bitnami redis subchart values (consumed verbatim) ─────────────────────
# See: https://artifacthub.io/packages/helm/bitnami/redis
redis:
  enabled: true
  # UPDATE: same Bitnami licensing note as postgresql.
  image:
    registry: docker.io
    repository: bitnamilegacy/redis
    tag: 7.2.5
  architecture: standalone
  auth:
    enabled: false
  master:
    persistence:
      enabled: true
      # UPDATE: bump for prod (5Gi+ typical).
      size: 1Gi
    extraFlags:
      - "--save"
      - "60"
      - "1"
      - "--loglevel"
      - "warning"
    resources:
      requests: { cpu: 50m, memory: 128Mi }
      limits:   { cpu: 500m, memory: 512Mi }
