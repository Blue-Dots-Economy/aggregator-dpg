# ═══════════════════════════════════════════════════════════════════════════
# Default values for aggregator-dpg umbrella chart.
#
# This file ships dev-safe defaults. For real deployments, layer
# values-prod.yaml on top with `-f values-prod.yaml` and supply secrets via
# `secrets.existingSecret` (referencing a SealedSecret / ExternalSecret).
# ═══════════════════════════════════════════════════════════════════════════

global:
  # Public FQDN — must have a DNS A record reaching the ingress controller.
  publicHost: portal.example.com
  publicProtocol: https

  # Container registry where web/api/worker/keycloak images are pushed.
  imageRegistry: ghcr.io/your-org
  imagePullSecrets: []

  # Cluster storage class for PVCs. Empty = cluster default.
  storageClass: ''

  keycloakRealm: aggregator

  # Active signalstack network. Drives the api/worker/web config-folder
  # selection and the keycloak themes-init image tag. Override per
  # release via -f values-purple.yaml (or values-blue.yaml).
  aggregatorNetwork: blue_dot

  oidc:
    clientId: aggregator-portal
    scope: 'openid profile email'

  # AWS S3 used for bulk uploads, QR pngs, error CSVs.
  s3:
    region: ap-south-1
    bucket: aggregator-bulk-uploads
    forcePathStyle: false

  # If set, subcharts reference this Secret name instead of the umbrella's
  # templated `{release}-secrets`. The named Secret MUST exist before
  # `helm install` and carry every key listed under `secrets.*` below.
  existingSecret: ''

  # Workaround for the compose `extra_hosts: PUBLIC_HOST:host-gateway` quirk.
  # Provide one entry per app pod so server-side back-channel calls to the
  # OIDC issuer URL resolve to the ingress controller cluster IP rather
  # than bouncing through external DNS.
  #
  #   hostAliases:
  #     - ip: "10.0.0.42"
  #       hostnames: [portal.example.com]
  hostAliases: []

  logLevel: info

# ─── Ingress (single host, multi-path) ─────────────────────────────────────
ingress:
  enabled: true
  className: nginx
  # cert-manager ClusterIssuer name. Must exist in the cluster already.
  clusterIssuer: letsencrypt-prod
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: '1024m'
    nginx.ingress.kubernetes.io/proxy-buffer-size: '32k'
    nginx.ingress.kubernetes.io/proxy-read-timeout: '300'
    nginx.ingress.kubernetes.io/proxy-send-timeout: '300'

# ─── Secrets ───────────────────────────────────────────────────────────────
# If existingSecret is set, the umbrella does NOT render its own Secret —
# the named Secret must already exist with the same keys listed below.
secrets:
  # Deprecated alias of global.existingSecret. If set, global.existingSecret
  # takes precedence (kept for ergonomic top-level reference).
  existingSecret: ''
  postgresPassword: change-me-postgres-password
  kcBootstrapAdminPassword: change-me-keycloak-admin
  keycloakAdminClientSecret: change-me-kc-admin-client-secret
  approvalTokenSecret: change-me-32-hex-min-chars-required-here
  sessionKey: change-me-32-hex-min-chars-required-here
  oidcClientSecret: change-me-portal-client-secret
  bffServiceClientSecret: ''
  smtpUser: ''
  smtpPassword: ''
  twilioAccountSid: ''
  twilioAuthToken: ''
  twilioFromNumber: ''
  awsAccessKeyId: ''
  awsSecretAccessKey: ''
  # MSG91 (used only when keycloak.smsProvider=msg91).
  msg91AuthKey: ''
  msg91TemplateId: ''
  msg91SenderId: ''

# ─── Mail wiring (shared by api + keycloak) ────────────────────────────────
mail:
  provider: smtp # smtp | ses
  smtp:
    # Real SMTP relay host. No in-cluster mailcatcher — wire to SES /
    # SendGrid / Workspace SMTP / etc. Empty value disables SMTP wiring.
    host: ''
    port: 587
    from: no-reply@bluedots.local
    fromDisplay: 'Blue Dots Aggregator'
    secure: false
    starttls: true
    auth: true
  ses:
    from: ''
    configurationSet: ''

# ─── App subcharts ─────────────────────────────────────────────────────────
web:
  replicaCount: 2
  image:
    repository: aggregator-dpg/web
    tag: '' # falls back to Chart.AppVersion
    pullPolicy: IfNotPresent
  service:
    port: 3000
  resources:
    requests: { cpu: 100m, memory: 256Mi }
    limits: { cpu: 1, memory: 1Gi }
    # Tune up for prod (apps/web is a Next.js standalone build).
  hpa:
    enabled: false
    minReplicas: 2
    maxReplicas: 6
    targetCPU: 70

api:
  replicaCount: 2
  image:
    repository: aggregator-dpg/api
    tag: ''
    pullPolicy: IfNotPresent
  service:
    port: 4000
  resources:
    requests: { cpu: 200m, memory: 512Mi }
    limits: { cpu: 2, memory: 1Gi }
  runMigrationsOnBoot: true
  bulk:
    uploadUrlTtlSeconds: 900
    uploadMaxBytes: 10485760
    qrDownloadUrlTtlSeconds: 900
  adminEmails: 'admin@bluedots.local'
  publicLinkBaseUrl: '' # empty => derived from global.publicProtocol+publicHost
  serviceAccount:
    create: true
    # For IRSA on EKS:
    #   annotations:
    #     eks.amazonaws.com/role-arn: arn:aws:iam::<acct>:role/<role>
    annotations: {}
  hpa:
    enabled: false
    minReplicas: 2
    maxReplicas: 6
    targetCPU: 70

worker:
  replicaCount: 1
  image:
    repository: aggregator-dpg/worker
    tag: ''
    pullPolicy: IfNotPresent
  resources:
    requests: { cpu: 100m, memory: 384Mi }
    limits: { cpu: 1, memory: 1Gi }
  bulk:
    maxRows: 10000
    maxRowBytes: 65536
  cron:
    linkMetricsRollupIntervalMs: 300000
    watchdogIntervalMs: 3600000
  serviceAccount:
    create: true
    annotations: {}

keycloak:
  replicaCount: 1
  image:
    repository: aggregator-dpg/keycloak
    tag: '26.5.5-aggregator'
    pullPolicy: IfNotPresent
  bootstrapAdminUsername: admin
  smsProvider: log # log | twilio | sns | msg91
  awsRegion: ap-south-1
  # MSG91 template variable receiving OTP code (non-secret, defaults to 'var').
  msg91OtpVarName: var
  service:
    port: 8080
    mgmtPort: 9000
  resources:
    requests: { cpu: 250m, memory: 768Mi }
    limits: { cpu: 1, memory: 1500Mi }

# ─── Bitnami postgresql subchart values (consumed verbatim) ────────────────
# See: https://artifacthub.io/packages/helm/bitnami/postgresql
postgresql:
  enabled: true
  auth:
    username: aggregator
    database: aggregator
    # When the umbrella templates a Secret, this is auto-set to that name in
    # values-dev.yaml / via helm install --set. When existingSecret is wired
    # at umbrella level, point this at the same Secret + use these key names.
    existingSecret: ''
    secretKeys:
      adminPasswordKey: postgres-password
      userPasswordKey: postgres-password
  primary:
    persistence:
      enabled: true
      size: 10Gi
    initdb:
      scripts:
        01-create-keycloak-db.sql: |
          CREATE DATABASE keycloak OWNER aggregator;
    resources:
      requests: { cpu: 250m, memory: 512Mi }
      limits: { cpu: 2, memory: 2Gi }

# ─── Bitnami redis subchart values (consumed verbatim) ─────────────────────
# See: https://artifacthub.io/packages/helm/bitnami/redis
redis:
  enabled: true
  architecture: standalone
  auth:
    enabled: false
  master:
    persistence:
      enabled: true
      size: 2Gi
    extraFlags:
      - '--save'
      - '60'
      - '1'
      - '--loglevel'
      - 'warning'
    resources:
      requests: { cpu: 50m, memory: 128Mi }
      limits: { cpu: 500m, memory: 512Mi }
