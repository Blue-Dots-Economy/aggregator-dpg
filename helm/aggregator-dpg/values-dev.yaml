# Dev overlay — single-node Kind / Minikube / Docker-Desktop friendly.
# Use:  helm install aggregator helm/aggregator-dpg -f values-dev.yaml
#
# Secrets are plaintext here on purpose. NEVER commit changes that move
# secret values into git for non-dev environments.

global:
  publicHost: bluedots-aggregator.duckdns.org
  publicProtocol: https
  imageRegistry: ""
  storageClass: ""
  appLogLevel: debug

ingress:
  enabled: true
  className: nginx
  # cert-manager ClusterIssuer name. Must exist in the cluster (created by
  # umbrella template-clusterissuer.yaml or applied separately).
  clusterIssuer: letsencrypt-prod
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "1024m"

secrets:
  existingSecret: ""
  postgresPassword: aggregator-dev
  kcBootstrapAdminPassword: kc-admin-dev
  keycloakAdminClientSecret: aggregator-api-dev-secret
  approvalTokenSecret: dev-approval-token-secret-32chars-min
  sessionKey: dev-session-key-32-chars-minimum-okay
  oidcClientSecret: aggregator-portal-dev-secret
  bffServiceClientSecret: ""               # falls back to keycloakAdminClientSecret

web:
  replicaCount: 1
  image:
    repository: docker.io/vinodbbhorge/aggregator-dpg-web
    tag: v1.0.0
    pullPolicy: IfNotPresent

api:
  replicaCount: 1
  image:
    repository: docker.io/vinodbbhorge/aggregator-dpg-api
    tag: v1.0.0

worker:
  replicaCount: 1
  image:
    repository: docker.io/vinodbbhorge/aggregator-dpg-worker
    tag: v1.0.0

keycloak:
  replicaCount: 1
  # v1.0.0 image baked `kc.sh build` without SMS SPI; --optimized at runtime
  # rejects the KC_SPI_SMS_PROVIDER override and exits. Disable here so KC
  # auto-rebuilds on boot. Re-enable once image is rebuilt with SPI baked in.
  optimized: false
  image:
    repository: docker.io/vinodbbhorge/aggregator-dpg-keycloak
    tag: v1.0.0

postgresql:
  image:
    registry: docker.io
    repository: bitnamilegacy/postgresql
    tag: 17.6.0
  auth:
    existingSecret: aggregator-secrets
    secretKeys:
      adminPasswordKey: postgres-password
      userPasswordKey: password
  primary:
    persistence:
      size: 2Gi

redis:
  image:
    registry: docker.io
    repository: bitnamilegacy/redis
    tag: 7.2.5
  master:
    persistence:
      size: 1Gi
