# Dev overlay — single-node Kind / Minikube / Docker-Desktop friendly.
# Use:  helm install aggregator helm/aggregator-dpg -f values-dev.yaml
#
# Secrets are plaintext here on purpose. NEVER commit changes that move
# secret values into git for non-dev environments.

global:
  publicHost: portal.dev.local
  publicProtocol: http
  # Empty registry => helper emits just `<repository>:<tag>`. Matches the
  # docker-compose image refs (`aggregator-dpg/api:dev`).
  imageRegistry: ""
  storageClass: ""
  logLevel: debug

ingress:
  enabled: true
  className: nginx
  # No cert-manager in local clusters by default; chart still renders the
  # annotation but the cluster issuer just won't act. Remove from chart if
  # local dev doesn't have cert-manager installed at all.
  clusterIssuer: ""
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "1024m"

secrets:
  existingSecret: ""
  postgresPassword: aggregator-dev
  kcBootstrapAdminPassword: kc-admin-dev
  keycloakAdminClientSecret: aggregator-api-dev-secret
  approvalTokenSecret: dev-approval-token-secret-32chars-min
  sessionKey: dev-session-key-32-chars-minimum-okay
  oidcClientSecret: aggregator-portal-dev-secret
  bffServiceClientSecret: ""               # falls back to keycloakAdminClientSecret

web:
  replicaCount: 1
  image:
    tag: dev
    pullPolicy: IfNotPresent

api:
  replicaCount: 1
  image:
    tag: dev

worker:
  replicaCount: 1
  image:
    tag: dev

keycloak:
  replicaCount: 1
  image:
    tag: "26.5.5-aggregator-dev"

postgresql:
  primary:
    persistence:
      size: 2Gi

redis:
  master:
    persistence:
      size: 1Gi
