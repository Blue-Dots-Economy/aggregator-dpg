# Production overlay.
#
# Wire `secrets.existingSecret` to an external Secret managed by SealedSecrets,
# ExternalSecrets-Operator, SOPS, or HashiCorp Vault Secrets Operator. The
# Secret MUST contain these keys (umbrella _helpers picks them up):
#
#   postgres-password                  (Bitnami postgresql expects this exact key)
#   POSTGRES_PASSWORD
#   KC_BOOTSTRAP_ADMIN_PASSWORD
#   KEYCLOAK_ADMIN_CLIENT_SECRET
#   APPROVAL_TOKEN_SECRET
#   SESSION_KEY
#   OIDC_CLIENT_SECRET
#   BFF_SERVICE_CLIENT_SECRET           (optional — falls back to KEYCLOAK_ADMIN_CLIENT_SECRET)
#   SMTP_USER, SMTP_PASSWORD            (optional)
#   TWILIO_ACCOUNT_SID, TWILIO_AUTH_TOKEN, TWILIO_FROM_NUMBER  (optional)
#   AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY                    (omit when using IRSA)

global:
  publicHost: portal.example.com
  publicProtocol: https
  imageRegistry: ghcr.io/your-org
  storageClass: gp3
  logLevel: info

ingress:
  enabled: true
  className: nginx
  clusterIssuer: letsencrypt-prod
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "1024m"
    nginx.ingress.kubernetes.io/proxy-buffer-size: "32k"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    cert-manager.io/cluster-issuer: letsencrypt-prod

secrets:
  existingSecret: aggregator-secrets       # owned by external secret system

web:
  replicaCount: 2
  image:
    tag: ""                                # let Chart.AppVersion drive the rollout
  hpa:
    enabled: true
    minReplicas: 2
    maxReplicas: 8
    targetCPU: 70

api:
  replicaCount: 2
  image:
    tag: ""
  hpa:
    enabled: true
    minReplicas: 2
    maxReplicas: 8
    targetCPU: 70
  serviceAccount:
    create: true
    annotations:
      # Replace with the IAM role granting S3 access (Pod Identity / IRSA).
      eks.amazonaws.com/role-arn: arn:aws:iam::000000000000:role/aggregator-api-s3

worker:
  replicaCount: 1
  image:
    tag: ""
  serviceAccount:
    create: true
    annotations:
      eks.amazonaws.com/role-arn: arn:aws:iam::000000000000:role/aggregator-worker-s3

keycloak:
  replicaCount: 1
  smsProvider: sns                         # or twilio
  awsRegion: ap-south-1

mail:
  provider: ses
  ses:
    from: no-reply@example.com
    configurationSet: ""

postgresql:
  primary:
    persistence:
      size: 50Gi
    resources:
      requests: { cpu: 500m, memory: 1Gi }
      limits:   { cpu: 2,    memory: 4Gi }
  auth:
    existingSecret: aggregator-secrets     # must have key `postgres-password`

redis:
  master:
    persistence:
      size: 5Gi
