apiVersion: v2
name: aggregator-dpg
description: Blue Dots Aggregator Portal — full stack umbrella chart (web BFF, api, worker, Keycloak, Postgres, Redis).
type: application
version: 0.1.0
appVersion: "0.1.0"
kubeVersion: ">=1.24.0-0"
keywords:
  - aggregator
  - bluedots
  - onest
  - dpg
  - keycloak
  - bff
home: https://github.com/sanketika-labs/aggregator-dpg
maintainers:
  - name: sanketika
    email: ops@sanketika.in

dependencies:
  - name: postgresql
    version: "15.5.x"
    repository: https://charts.bitnami.com/bitnami
    condition: postgresql.enabled

  - name: redis
    version: "19.6.x"
    repository: https://charts.bitnami.com/bitnami
    condition: redis.enabled

  - name: web
    version: 0.1.0
    repository: file://charts/web

  - name: api
    version: 0.1.0
    repository: file://charts/api

  - name: worker
    version: 0.1.0
    repository: file://charts/worker

  - name: keycloak
    version: 0.1.0
    repository: file://charts/keycloak
