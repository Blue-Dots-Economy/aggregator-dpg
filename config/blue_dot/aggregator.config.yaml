# Active aggregator config for the running stack. Pinned to blue_dot;
# swap `network.source` to deploy against another signalstack network.
# Treat this file as deploy state; the .example.yaml sibling documents
# every supported field.

aggregator:
  name: Blue Dots Aggregator
  contact_email: ops@bluedots.local

  network:
    source: https://raw.githubusercontent.com/Blue-Dots-Economy/Signals-DPG/refs/heads/develop/examples/schemas/blue_dot/network.json
    csv_array_delimiter: '|'
    field_overrides:
      seeker:
        name: name
        phone: phone
        email: email
      provider:
        name: jobProviderName
        phone: hiringManagerPhoneNumber
        email: hiringManagerEmail

  brand:
    short_name: Blue Dots
    long_name: Blue Dots Aggregator Portal
    tagline: Track every participant in your network — at a glance.
    url_slug: blue-dots
    # Canonical hex from Blue Dots Brand Guidelines (see brand.json).
    primary_color: '#0074ff'
    accent_color: '#57abff'

  domain_labels:
    seeker:
      singular: Seeker
      plural: Seekers
      tab_label: Seekers
    provider:
      singular: Provider
      plural: Providers
      tab_label: Providers

  onboarding:
    presume_consent: true
    bulk_max_rows: 10000

  # Per-link registration modes. Each key names an admin-facing channel.
  # `submission_shape` decides what the public form renders:
  #   - account_only        : MinimalIdentityForm (name + phone OR email + consent).
  #   - account_and_profile : full RJSF profile schema; partial submissions accepted.
  # `public_hint_i18n_key` is the i18n key rendered beneath the form;
  # null means no hint.
  registration_modes:
    voice:
      label_i18n_key: registration_mode.voice.label
      submission_shape: account_only
      public_hint_i18n_key: registration_mode.voice.hint
    form:
      label_i18n_key: registration_mode.form.label
      submission_shape: account_and_profile
      public_hint_i18n_key: null

  admin_emails:
    - abhishekg@sanketika.in
