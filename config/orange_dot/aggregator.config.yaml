# Active aggregator config for the running stack. Switched to orange_dot
# for the third network rollout; the same docker image runs blue_dot,
# purple_dot, or any other signalstack network by editing only this file.
# Treat as deploy state; the .example.yaml sibling documents every
# supported field.

aggregator:
  name: Orange Dots Aggregator
  contact_email: ops@orangedots.local

  network:
    # Pin to a tag in production; develop is fine for local iteration.
    source: https://raw.githubusercontent.com/Blue-Dots-Economy/Signals-DPG/refs/heads/develop/examples/schemas/orange_dot/network.json
    # Mirror the purple_dot bulk-CSV array-delimiter for now — adjust
    # if orange_dot's schemas use a different separator.
    csv_array_delimiter: '|'
    field_overrides:
      seeker:
        name: beneficiary_name
        phone: mobile_number
        email: email
      provider:
        name: contact_name
        phone: contact_phone
        email: contact_email

  brand:
    short_name: Orange Dots
    long_name: Orange Dot Aggregator Portal
    tagline: Discovery & services network — orange edition
    url_slug: orange-dots
    # Canonical hex from Orange Dots brand palette.
    # Orange 700 (deep) for CTAs — high contrast on white text.
    primary_color: '#c45a00'
    accent_color: '#ffa54d'

  domain_labels:
    seeker:
      singular: Beneficiary
      plural: Beneficiaries
      tab_label: Beneficiaries
    provider:
      singular: Service Provider
      plural: Service Providers
      tab_label: Providers

  onboarding:
    presume_consent: true
    bulk_max_rows: 10000

  admin_emails:
    - abhishekg@sanketika.in
