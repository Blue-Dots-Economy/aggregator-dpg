# Active aggregator config for the running stack. Switched to purple_dot
# for the PWD-services rollout; the same docker image runs blue_dot,
# yellow_dot, or any other signalstack network by editing only this file.
# Treat as deploy state; the .example.yaml sibling documents every
# supported field.

aggregator:
  name: Purple Dots Aggregator
  contact_email: ops@purpledots.local

  network:
    # Pin to a tag in production; develop is fine for local iteration.
    source: https://raw.githubusercontent.com/Blue-Dots-Economy/Signals-DPG/refs/heads/develop/examples/schemas/purple_dot/network.json
    # Purple_dot schemas have array-typed fields (disability_type,
    # looking_for, documents_available) — bulk CSV cells use `|` as the
    # delimiter.
    csv_array_delimiter: '|'
    field_overrides:
      seeker:
        name: beneficiary_name
        phone: mobile_number
        email: email
      provider:
        name: contact_name
        phone: contact_phone
        email: contact_email

  brand:
    short_name: Purple Dots
    long_name: Purple Dot Aggregator Portal
    tagline: Discovery & services network for People with Disabilities
    url_slug: purple-dots
    # Canonical hex from Purple Dots Brand Guidelines (see brand.json).
    # Purple 700 (deep) for CTAs — AAA contrast on white text.
    primary_color: '#4c29c3'
    accent_color: '#a176e4'

  domain_labels:
    seeker:
      singular: Beneficiary
      plural: Beneficiaries
      tab_label: Beneficiaries
    provider:
      singular: Service Provider
      plural: Service Providers
      tab_label: Providers

  onboarding:
    presume_consent: true
    bulk_max_rows: 10000

  admin_emails:
    - abhishekg@sanketika.in
