name: aggregator-dpg

# ═══════════════════════════════════════════════════════════════════════════
# Unified LOCAL stack for the Blue Dots / Signal Stack ecosystem.
#
# Brings up — in one `docker compose up -d` — every shared dependency AND both
# DPGs, wired for localhost development:
#
#   Infra    postgres (3 DBs), signals-redis, aggregator-redis,
#            keycloak, minio (+init), mailpit
#   signals-dpg   signals-bootstrap (one-shot: migrate+seed) -> signals-api -> signals-ui
#   aggregator-dpg   aggregator-api (auto-migrates) -> aggregator-web + aggregator-worker
#
# This file is for LOCAL DEV ONLY. It intentionally does NOT use the
# nginx+certbot ingress that aggregator-dpg/docker-compose.yml ships for VM/prod
# deploys — everything is exposed on plain-HTTP host ports so a new joinee can
# poke each service directly. See LOCAL_SETUP.md (next to this file) for the
# full walkthrough.
#
# ── Where this lives / how to run ────────────────────────────────────────────
# This compose lives at `aggregator-dpg/local-setup/` and builds BOTH repos, so
# it assumes `signals-dpg` and `aggregator-dpg` are checked out as SIBLINGS
# under a common parent directory:
#
#     <parent>/
#       ├── aggregator-dpg/          (this repo)
#       │     └── local-setup/       ← run `docker compose` from HERE
#       └── signals-dpg/             (sibling; built via ../../signals-dpg)
#
# Always run compose FROM this directory so the relative build contexts and
# volume mounts resolve:
#     cd aggregator-dpg/local-setup
#     cp .env.example .env    # then set ADMIN_EMAILS (see LOCAL_SETUP.md §2)
#     docker compose up -d --build
#
# ── Host ports ──────────────────────────────────────────────────────────────
#   Aggregator portal (web)  http://localhost:3100
#   Aggregator API           http://localhost:4000        /health/live
#   Signals API              http://localhost:2742        (Swagger at /reference)
#   Signals UI               http://localhost:5173        (must be 5173 — see note)
#   Keycloak admin           http://localhost:8080/admin  (admin / KC_ADMIN_PASSWORD)
#   Mailpit inbox            http://localhost:8025        (catches ALL outbound email)
#   MinIO console            http://localhost:9001        (minioadmin / MINIO_ROOT_PASSWORD)
#   MinIO S3 API             http://localhost:9000
#   Postgres                 localhost:5432               (dbs: aggregator, signals, keycloak)
#   signals-redis            localhost:5555               (password-protected)
#   aggregator-redis         localhost:6379
#
# Ports match each project's own setup guide (signals-dpg/SETUP.md,
# aggregator-dpg/QUICKSTART.md): signals api 2742 / ui 5173 / redis 5555,
# aggregator web 3100 / api 4000 / redis 6379 / keycloak 8080. The Signals UI
# MUST be on 5173 — the Signals API only allows CORS from :3000, :5173, :2742
# (packages/config/src/allowed_origins.ts). The unified stack runs ONE shared
# Postgres on :5432 (the per-repo guides use separate 5432/5433).
#
# ⚠️  ONE host requirement: add `127.0.0.1 keycloak` to /etc/hosts so the browser
#     and the web container resolve the OIDC issuer to the SAME Keycloak.
#     (macOS/Linux: `echo "127.0.0.1 keycloak" | sudo tee -a /etc/hosts`)
# ═══════════════════════════════════════════════════════════════════════════

services:
  # ───────────────────────────────────────────────────────────────────────
  # Shared infrastructure
  # ───────────────────────────────────────────────────────────────────────

  postgres:
    # Custom image: Postgres 17 + PostGIS + pgvector. signals-dpg's db:init
    # runs `CREATE EXTENSION postgis` AND `CREATE EXTENSION vector`; no single
    # stock image ships both. See infra/postgres.Dockerfile.
    build:
      context: ./infra
      dockerfile: postgres.Dockerfile
    image: signals-dots/postgres:17-postgis-pgvector
    container_name: sd-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-dpg}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
      POSTGRES_DB: ${AGGREGATOR_DB:-aggregator}
    ports:
      - "5432:5432"
    volumes:
      - sd-postgres-data:/var/lib/postgresql/data
      # Creates the `signals` and `keycloak` databases on first boot.
      - ./infra/postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dpg} -d ${AGGREGATOR_DB:-aggregator}"]
      interval: 5s
      timeout: 3s
      retries: 20

  # signals-dpg REQUIRES a Redis password; kept on its own instance to avoid
  # forcing a password onto aggregator's password-less client.
  signals-redis:
    image: redis:7.2-alpine
    container_name: sd-signals-redis
    restart: unless-stopped
    command: ["sh", "-c", "exec redis-server --appendonly yes --requirepass \"$$REDIS_PASSWORD\""]
    environment:
      REDIS_PASSWORD: ${SIGNALS_REDIS_PASSWORD:?SIGNALS_REDIS_PASSWORD must be set in .env}
    ports:
      # Host 5555 to match signals-dpg/SETUP.md (its REDIS_PORT). Container 6379.
      - "5555:6379"
    volumes:
      - sd-signals-redis-data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$$REDIS_PASSWORD\" ping | grep -q PONG"]
      interval: 5s
      timeout: 3s
      retries: 20

  # aggregator-dpg's api/web/worker connect with a password-less redis:// URL.
  aggregator-redis:
    image: redis:7-alpine
    container_name: sd-aggregator-redis
    restart: unless-stopped
    command: ["redis-server", "--save", "60", "1", "--loglevel", "warning"]
    ports:
      # Host 6379 to match aggregator-dpg's default Redis port.
      - "6379:6379"
    volumes:
      - sd-aggregator-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  # Local SMTP catch-all. Every email the stack sends (Keycloak OTP, aggregator
  # approval mails) lands in the Mailpit inbox at http://localhost:8025 — no
  # real SMTP account needed for local dev.
  mailpit:
    image: axllent/mailpit:latest
    container_name: sd-mailpit
    restart: unless-stopped
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: "true"
      MP_SMTP_AUTH_ALLOW_INSECURE: "true"
    ports:
      - "8025:8025"   # web UI
      - "1025:1025"   # SMTP
    healthcheck:
      test: ["CMD", "sh", "-c", "wget -qO- http://localhost:8025/livez || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 10

  # S3-compatible object storage for aggregator bulk uploads + QR PNGs.
  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: sd-minio
    restart: unless-stopped
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_REGION: ${S3_REGION:-us-east-1}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - sd-minio-data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9000/minio/health/live || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s

  # Creates the aggregator upload bucket once MinIO is healthy. Idempotent.
  minio-init:
    image: minio/mc:RELEASE.2025-04-16T18-13-26Z
    container_name: sd-minio-init
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      S3_BUCKET: ${S3_BUCKET:-aggregator-bulk-uploads}
    entrypoint:
      - sh
      - -c
      - |
        set -e
        mc alias set local http://minio:9000 "$$MINIO_ROOT_USER" "$$MINIO_ROOT_PASSWORD"
        mc mb --ignore-existing "local/$$S3_BUCKET"
        echo "minio-init: bucket '$$S3_BUCKET' ready"
    restart: "no"

  # ───────────────────────────────────────────────────────────────────────
  # Keycloak — identity for aggregator-dpg (OIDC + email/phone OTP)
  #
  # Reuses aggregator-dpg's realm import, OTP SPI jar, and brand themes, but
  # runs in LOCALHOST mode (root path on :8080, no nginx /auth subpath).
  # render-realm.sh substitutes __PUBLIC_BASE_URL__ + __SMTP_*__ placeholders
  # in the realm JSON at boot; the aggregator_id / phone_number protocol
  # mappers and unmanagedAttributePolicy are already baked into the realm JSON
  # (no manual mapper step needed).
  # ───────────────────────────────────────────────────────────────────────
  keycloak:
    image: quay.io/keycloak/keycloak:26.5.5
    container_name: sd-keycloak
    restart: unless-stopped
    entrypoint: ["/opt/keycloak/render-realm.sh"]
    command: ["start-dev", "--import-realm"]
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KC_ADMIN_USERNAME:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KC_ADMIN_PASSWORD:?KC_ADMIN_PASSWORD must be set in .env}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: ${POSTGRES_USER:-dpg}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD}
      # Localhost mode: root path, permissive hostname, http allowed.
      KC_HOSTNAME: keycloak
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
      KC_HEALTH_ENABLED: "true"
      # Substituted into realm JSON (post-logout redirect + displayName). The
      # realm already lists http://localhost:3100 in redirectUris/webOrigins.
      PUBLIC_BASE_URL: "http://localhost:3100"
      # Email OTP via Mailpit — zero external SMTP creds for local dev.
      SMTP_HOST: mailpit
      SMTP_PORT: "1025"
      SMTP_FROM: ${SMTP_FROM:-no-reply@bluedots.local}
      SMTP_FROM_DISPLAY: ${SMTP_FROM_DISPLAY:-Blue Dots Aggregator}
      SMTP_AUTH: "false"
      SMTP_STARTTLS: "false"
      SMTP_SSL: "false"
      # SMS OTP: 'log' writes the code to keycloak logs (no Twilio/SNS/MSG91).
      KC_SPI_SMS_PROVIDER: log
    env_file:
      # Brand strings (BRAND_*, HERO_*) for the login theme.
      - ../config/${AGGREGATOR_NETWORK:-blue_dot}/keycloak.env
    ports:
      - "8080:8080"
    volumes:
      - ../infra/keycloak/realms:/opt/keycloak/data/import-template:ro
      - ../infra/keycloak/providers:/opt/keycloak/providers:ro
      - ../infra/keycloak/render-realm.sh:/opt/keycloak/render-realm.sh:ro
      - ../infra/keycloak/themes:/opt/keycloak/themes:ro
    tmpfs:
      - /opt/keycloak/data/import:uid=1000,gid=0,mode=0775
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      # Management interface (port 9000) serves /health/ready at root path.
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/9000 && echo -e 'GET /health/ready HTTP/1.1\\r\\nhost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && head -1 <&3 | grep -q '200'"]
      interval: 10s
      timeout: 5s
      retries: 40
      start_period: 40s

  # Post-import init: applies settings that Keycloak's realm import does NOT
  # reliably apply from the realm JSON — most importantly
  # unmanagedAttributePolicy=ENABLED, WITHOUT which the API's custom
  # `aggregator_id` / `phone_number` user attributes are silently dropped and
  # the registration-approval page 404s ("identity record missing"). Also
  # re-applies SMTP + reconciles the aggregator-portal client secret. Runs once,
  # idempotently. Reuses aggregator-dpg/infra/keycloak/init/apply-user-profile.sh.
  keycloak-init:
    image: alpine:3.20
    container_name: sd-keycloak-init
    depends_on:
      keycloak:
        condition: service_healthy
    environment:
      KC_URL: http://keycloak:8080          # root path (no /auth) in this stack
      KC_REALM: ${KEYCLOAK_REALM:-aggregator}
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KC_ADMIN_USERNAME:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KC_ADMIN_PASSWORD:?KC_ADMIN_PASSWORD must be set in .env}
      UNMANAGED_POLICY: ENABLED
      SMTP_HOST: mailpit
      SMTP_PORT: "1025"
      SMTP_FROM: ${SMTP_FROM:-no-reply@bluedots.local}
      SMTP_FROM_DISPLAY: ${SMTP_FROM_DISPLAY:-Blue Dots Aggregator}
      SMTP_SECURE: "false"
      SMTP_USER: ""
      SMTP_PASSWORD: ""
      # Reconcile the portal client secret to match the web BFF config.
      OIDC_CLIENT_SECRET: ${OIDC_PORTAL_CLIENT_SECRET:-aggregator-portal-dev-secret-change-me}
      PORTAL_CLIENT_ID: aggregator-portal
    volumes:
      - ../infra/keycloak/init:/init:ro
    entrypoint: ["sh", "-c", "apk add --no-cache curl jq > /dev/null && sh /init/apply-user-profile.sh"]
    restart: "no"

  # ───────────────────────────────────────────────────────────────────────
  # signals-dpg (DPG / Signals Stack) — upstream source of truth
  # ───────────────────────────────────────────────────────────────────────

  # One-shot: applies Drizzle schema + SQL bootstrap + seeds the aggregator-dpg
  # / voice-dpg service users & apikeys. Exits 0 on success. The minted apikeys
  # print to its logs on FIRST run only — capture them with:
  #   docker compose logs signals-bootstrap
  # (needed to wire aggregator -> signals; see LOCAL_SETUP.md §"Cross-DPG").
  signals-bootstrap:
    build:
      context: ../../signals-dpg
      # Dockerfile path is relative to the build context (../../signals-dpg),
      # so it points back into this repo's local-setup/infra directory.
      dockerfile: ../aggregator-dpg/local-setup/infra/signals-bootstrap.Dockerfile
    container_name: sd-signals-bootstrap
    command:
      - sh
      - -lc
      - |
        set -e
        echo "signals-bootstrap: applying schema (drizzle-kit push --force)…"
        # drizzle.config.ts sets strict:true, which prompts for confirmation.
        # There is no TTY in this container, so pass --force to apply without a
        # prompt (the `db:push` npm script alone would hang / exit 1 here).
        pnpm --filter api exec drizzle-kit push --force
        echo "signals-bootstrap: initialising item/action/event tables (db:init)…"
        pnpm --filter api db:init
        echo "signals-bootstrap: seeding service users + apikeys (db:seed:services)…"
        pnpm --filter api db:seed:services
        echo "signals-bootstrap: DONE. Capture any apikeys printed above."
    environment: &signals-env
      INSTANCE_NAME: signals-local
      INSTANCE_ENV: development
      API_DOMAIN: http://localhost
      API_PORT: "2742"
      AUTH_SECRET: ${SIGNALS_AUTH_SECRET:?SIGNALS_AUTH_SECRET must be set in .env}
      AUTH_MIDDLEWARE_ENABLED: "true"
      CREATE_TEST_OTP: "true"
      SERVED_DOMAINS: ${SIGNALS_SERVED_DOMAINS:-blue_dot/seeker,blue_dot/provider}
      NETWORK_CONFIG_SOURCE: local
      NETWORK_CONFIG_LOCAL_FILE: examples/schemas/blue_dot/network.json
      POSTGRES_USER: ${POSTGRES_USER:-dpg}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: signals
      POSTGRES_HOST: postgres
      DATABASE_PORT: "5432"
      POSTGRES_URL: postgres://${POSTGRES_USER:-dpg}:${POSTGRES_PASSWORD}@postgres:5432/signals
      REDIS_HOST: signals-redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${SIGNALS_REDIS_PASSWORD}
      REDIS_URL: redis://:${SIGNALS_REDIS_PASSWORD}@signals-redis:6379
      SIGNALS_PII_KEY: ${SIGNALS_PII_KEY:?SIGNALS_PII_KEY must be a base64-encoded 32-byte key}
    depends_on:
      postgres:
        condition: service_healthy
      signals-redis:
        condition: service_healthy
    restart: "no"

  signals-api:
    build:
      context: ../../signals-dpg
      dockerfile: apps/api/Dockerfile
    image: signals-dpg/api:local
    container_name: sd-signals-api
    restart: unless-stopped
    # Inherits the exact same env as the bootstrap step.
    environment: *signals-env
    ports:
      - "2742:2742"
    depends_on:
      signals-bootstrap:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      signals-redis:
        condition: service_healthy

  signals-ui:
    build:
      context: ../../signals-dpg
      dockerfile: apps/ui/Dockerfile
      args:
        VITE_API_URL: http://localhost:2742
        VITE_NETWORK_NAME: blue_dot
    image: signals-dpg/ui:local
    container_name: sd-signals-ui
    restart: unless-stopped
    environment:
      UI_VARIANT: signals
    ports:
      # MUST be 5173 — the Signals API's CORS allow-list is 3000/5173/2742 only.
      - "5173:80"
    depends_on:
      signals-api:
        condition: service_started

  # ───────────────────────────────────────────────────────────────────────
  # aggregator-dpg — Aggregator portal + API + worker
  # ───────────────────────────────────────────────────────────────────────

  aggregator-api:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    image: aggregator-dpg/api:local
    container_name: sd-aggregator-api
    restart: unless-stopped
    ports:
      # Published to the host so email links built from PUBLIC_API_URL
      # (http://localhost:4000 — e.g. the registration approve/reject pages,
      # which the API renders as HTML) open from the browser.
      - "4000:4000"
    environment:
      NODE_ENV: production
      PORT: "4000"
      HOST: "0.0.0.0"
      LOG_LEVEL: ${LOG_LEVEL:-info}
      CORS_ORIGINS: http://localhost:3100
      DATABASE_URL: postgres://${POSTGRES_USER:-dpg}:${POSTGRES_PASSWORD}@postgres:5432/${AGGREGATOR_DB:-aggregator}
      RUN_MIGRATIONS_ON_BOOT: "true"
      REDIS_URL: redis://aggregator-redis:6379
      # Keycloak (root path, localhost mode)
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-aggregator}
      KEYCLOAK_ADMIN_CLIENT_ID: aggregator-api
      KEYCLOAK_ADMIN_CLIENT_SECRET: ${OIDC_API_CLIENT_SECRET:-aggregator-api-dev-secret-change-me}
      # Mail -> Mailpit
      MAIL_PROVIDER: smtp
      SMTP_HOST: mailpit
      SMTP_PORT: "1025"
      SMTP_SECURE: "false"
      SMTP_FROM: ${SMTP_FROM:-no-reply@bluedots.local}
      SMTP_USER: ""
      SMTP_PASSWORD: ""
      # Approval flow — where new-aggregator approval emails go.
      APPROVAL_TOKEN_SECRET: ${APPROVAL_TOKEN_SECRET:?APPROVAL_TOKEN_SECRET must be set in .env (>=32 chars)}
      ADMIN_EMAILS: ${ADMIN_EMAILS:-admin@bluedots.local}
      PUBLIC_API_URL: http://localhost:4000
      PUBLIC_PORTAL_URL: http://localhost:3100
      PUBLIC_LINK_BASE_URL: http://localhost:3100
      # Bulk-upload + QR onboarding tuning (match aggregator-dpg/docker-compose.yml).
      BULK_UPLOAD_URL_TTL_SECONDS: ${BULK_UPLOAD_URL_TTL_SECONDS:-900}
      BULK_UPLOAD_MAX_BYTES: ${BULK_UPLOAD_MAX_BYTES:-10485760}
      QR_DOWNLOAD_URL_TTL_SECONDS: ${QR_DOWNLOAD_URL_TTL_SECONDS:-900}
      # Object storage -> MinIO (S3-compatible). Internal calls hit minio:9000;
      # browser-facing presigned URLs use localhost:9000.
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_BUCKET: ${S3_BUCKET:-aggregator-bulk-uploads}
      S3_FORCE_PATH_STYLE: "true"
      S3_ENDPOINT: http://minio:9000
      S3_PUBLIC_ENDPOINT: http://localhost:9000
      S3_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minioadmin}
      S3_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      # Per-network config (schemas + aggregator.config.yaml).
      SCHEMA_ROOT_DIR: /app/config/${AGGREGATOR_NETWORK:-blue_dot}/schemas
      AGGREGATOR_CONFIG_PATH: /app/config/${AGGREGATOR_NETWORK:-blue_dot}/aggregator.config.yaml
      # ── Cross-DPG push into signals (optional; see LOCAL_SETUP.md) ────────
      # SIGNALSTACK_ADMIN_KEY + SIGNALSTACK_ACTING_ORG_ID come from the
      # signals-bootstrap seed output. Leave blank to run aggregator standalone.
      SIGNALSTACK_BASE_URL: ${SIGNALSTACK_BASE_URL:-http://signals-api:2742}
      SIGNALSTACK_ADMIN_KEY: ${SIGNALSTACK_ADMIN_KEY:-}
      SIGNALSTACK_ACTING_ORG_ID: ${SIGNALSTACK_ACTING_ORG_ID:-}
      SIGNALSTACK_ITEM_NETWORK: ${AGGREGATOR_NETWORK:-blue_dot}
      SIGNALSTACK_TIMEOUT_MS: ${SIGNALSTACK_TIMEOUT_MS:-10000}
    volumes:
      - ../config:/app/config:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:4000/health/ready || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 15
      start_period: 15s
    depends_on:
      postgres:
        condition: service_healthy
      aggregator-redis:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      # Wait for the realm to have unmanagedAttributePolicy=ENABLED before the
      # API can create users — otherwise aggregator_id attributes are dropped.
      keycloak-init:
        condition: service_completed_successfully

  aggregator-web:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
      args:
        # NEXT_PUBLIC_* are inlined into the client bundle at build time.
        NEXT_PUBLIC_API_URL: http://localhost:4000
        NEXT_PUBLIC_ENABLED_LANGUAGES: ${NEXT_PUBLIC_ENABLED_LANGUAGES:-en,kn,hi}
    image: aggregator-dpg/web:local
    container_name: sd-aggregator-web
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
      NEXT_PUBLIC_API_URL: http://localhost:4000
      NEXT_PUBLIC_ENABLED_LANGUAGES: ${NEXT_PUBLIC_ENABLED_LANGUAGES:-en,kn,hi}
      API_BASE_URL: http://aggregator-api:4000
      # OIDC issuer must resolve identically for the browser AND this container.
      # Both reach Keycloak at http://keycloak:8080 (browser via the /etc/hosts
      # entry, container via docker DNS) so the token `iss` claim always matches.
      OIDC_ISSUER: http://keycloak:8080/realms/${KEYCLOAK_REALM:-aggregator}
      OIDC_CLIENT_ID: aggregator-portal
      OIDC_CLIENT_SECRET: ${OIDC_PORTAL_CLIENT_SECRET:-aggregator-portal-dev-secret-change-me}
      OIDC_REDIRECT_URI: http://localhost:3100/api/auth/callback
      OIDC_POST_LOGOUT_REDIRECT_URI: http://localhost:3100/
      OIDC_SCOPE: openid profile email
      # BFF service account (anonymous-proxy routes) reuses the api client.
      BFF_SERVICE_CLIENT_ID: aggregator-api
      BFF_SERVICE_CLIENT_SECRET: ${OIDC_API_CLIENT_SECRET:-aggregator-api-dev-secret-change-me}
      SESSION_COOKIE_NAME: sid
      SESSION_TTL_SECONDS: "43200"
      SESSION_KEY: ${SESSION_KEY:?SESSION_KEY must be set in .env (>=32 chars)}
      # Portal is served over plain HTTP locally -> cookies must NOT be Secure.
      COOKIE_SECURE: "false"
      PUBLIC_PORTAL_URL: http://localhost:3100
      REDIS_URL: redis://aggregator-redis:6379
      LOG_LEVEL: ${LOG_LEVEL:-info}
      SCHEMA_ROOT_DIR: /app/config/${AGGREGATOR_NETWORK:-blue_dot}/schemas
    ports:
      - "3100:3000"
    volumes:
      - ../config:/app/config:ro
    depends_on:
      aggregator-api:
        condition: service_healthy
      keycloak:
        condition: service_healthy

  aggregator-worker:
    build:
      context: ..
      dockerfile: apps/worker/Dockerfile
    image: aggregator-dpg/worker:local
    container_name: sd-aggregator-worker
    restart: unless-stopped
    environment:
      NODE_ENV: production
      LOG_LEVEL: ${LOG_LEVEL:-info}
      DATABASE_URL: postgres://${POSTGRES_USER:-dpg}:${POSTGRES_PASSWORD}@postgres:5432/${AGGREGATOR_DB:-aggregator}
      REDIS_URL: redis://aggregator-redis:6379
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_BUCKET: ${S3_BUCKET:-aggregator-bulk-uploads}
      S3_FORCE_PATH_STYLE: "true"
      S3_ENDPOINT: http://minio:9000
      S3_PUBLIC_ENDPOINT: http://localhost:9000
      S3_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minioadmin}
      S3_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      SCHEMA_ROOT_DIR: /app/config/${AGGREGATOR_NETWORK:-blue_dot}/schemas
      AGGREGATOR_CONFIG_PATH: /app/config/${AGGREGATOR_NETWORK:-blue_dot}/aggregator.config.yaml
      # Bulk-file processor caps + cron intervals (match aggregator-dpg/docker-compose.yml).
      BULK_MAX_ROWS: ${BULK_MAX_ROWS:-10000}
      BULK_MAX_ROW_BYTES: ${BULK_MAX_ROW_BYTES:-65536}
      LINK_METRICS_ROLLUP_INTERVAL_MS: ${LINK_METRICS_ROLLUP_INTERVAL_MS:-300000}
      WATCHDOG_INTERVAL_MS: ${WATCHDOG_INTERVAL_MS:-3600000}
      SIGNALSTACK_BASE_URL: ${SIGNALSTACK_BASE_URL:-http://signals-api:2742}
      SIGNALSTACK_ADMIN_KEY: ${SIGNALSTACK_ADMIN_KEY:-}
      SIGNALSTACK_ITEM_NETWORK: ${AGGREGATOR_NETWORK:-blue_dot}
      SIGNALSTACK_TIMEOUT_MS: ${SIGNALSTACK_TIMEOUT_MS:-10000}
    volumes:
      - ../config:/app/config:ro
    depends_on:
      postgres:
        condition: service_healthy
      aggregator-redis:
        condition: service_healthy

volumes:
  sd-postgres-data:
  sd-signals-redis-data:
  sd-aggregator-redis-data:
  sd-minio-data:
