name: Release Images

# Build & push container images to GHCR for api, web, worker and keycloak.
#
# Triggers
# --------
# * push of a tag matching one of:
#     - api-v*.*.*       → builds api
#     - web-v*.*.*       → builds web
#     - worker-v*.*.*    → builds worker
#     - keycloak-v*.*.*  → builds keycloak
#     - v*.*.*           → umbrella release, builds all four
# * workflow_dispatch — pick which images to build and an optional tag override.

on:
  push:
    tags:
      - 'v*.*.*'
      - 'api-v*.*.*'
      - 'web-v*.*.*'
      - 'worker-v*.*.*'
      - 'keycloak-v*.*.*'
  workflow_dispatch:
    inputs:
      api:
        description: 'Build api image'
        type: boolean
        default: true
      web:
        description: 'Build web image'
        type: boolean
        default: true
      worker:
        description: 'Build worker image'
        type: boolean
        default: true
      keycloak:
        description: 'Build keycloak image'
        type: boolean
        default: true
      tag:
        description: 'Extra image tag (e.g. "rc1"). Leave blank to use only auto tags.'
        type: string
        default: ''

concurrency:
  group: release-images-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io

jobs:
  build:
    name: Build / ${{ matrix.app }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - app: api
            context: .
            file: apps/api/Dockerfile
          - app: web
            context: .
            file: apps/web/Dockerfile
          - app: worker
            context: .
            file: apps/worker/Dockerfile
          - app: keycloak
            context: infra/keycloak
            file: infra/keycloak/Dockerfile

    # Gate each matrix entry:
    #   * workflow_dispatch → respect per-image boolean inputs
    #   * push of <app>-v*  → only that app
    #   * push of v*        → all apps (umbrella release)
    if: >-
      (github.event_name == 'workflow_dispatch' && (
        (matrix.app == 'api'      && inputs.api)      ||
        (matrix.app == 'web'      && inputs.web)      ||
        (matrix.app == 'worker'   && inputs.worker)   ||
        (matrix.app == 'keycloak' && inputs.keycloak)
      )) ||
      (github.event_name == 'push' && startsWith(github.ref, format('refs/tags/{0}-v', matrix.app))) ||
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') && !contains(github.ref, '-v'))

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags & labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.app }}
          tags: |
            type=semver,pattern={{version}},match=${{ matrix.app }}-v(.*),group=1
            type=semver,pattern={{major}}.{{minor}},match=${{ matrix.app }}-v(.*),group=1
            type=semver,pattern={{major}},match=${{ matrix.app }}-v(.*),group=1
            type=semver,pattern={{version}},match=v(.*),group=1
            type=semver,pattern={{major}}.{{minor}},match=v(.*),group=1
            type=sha,prefix=sha-,format=short
            type=raw,value=${{ inputs.tag }},enable=${{ inputs.tag != '' }}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/') }}
          labels: |
            org.opencontainers.image.title=aggregator-dpg-${{ matrix.app }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.licenses=UNLICENSED

      - name: Build & push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.app }}
          cache-to: type=gha,mode=max,scope=${{ matrix.app }}
          provenance: true
          sbom: true
          build-args: |
            VCS_REF=${{ github.sha }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            VERSION=${{ steps.meta.outputs.version }}

      - name: Summary
        run: |
          {
            echo "### ${APP} image pushed"
            echo ""
            echo "**Digest:** \`${DIGEST}\`"
            echo ""
            echo "**Tags:**"
            echo '```'
            echo "${TAGS}"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
        env:
          APP: ${{ matrix.app }}
          DIGEST: ${{ steps.build.outputs.digest }}
          TAGS: ${{ steps.meta.outputs.tags }}
