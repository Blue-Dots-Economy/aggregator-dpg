name: Keycloak

# Builds the custom Keycloak SPI image and the per-network theme image.
# Scoped to infra/keycloak changes so it stays independent of the main CI
# pipeline. paths filters apply to push / pull_request only —
# workflow_dispatch always runs (force-rebuild on demand).

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'infra/keycloak/**'
  pull_request:
    branches:
      - main
      - develop
    paths:
      - 'infra/keycloak/**'
  workflow_dispatch:

concurrency:
  group: keycloak-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io

jobs:
  docker:
    name: Docker / keycloak-${{ matrix.image }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - image: server
            context: infra/keycloak
            file: infra/keycloak/Dockerfile
          - image: theme
            context: .
            file: infra/keycloak/themes.Dockerfile

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags & labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}/keycloak-${{ matrix.image }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.title=aggregator-dpg-keycloak-${{ matrix.image }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.licenses=UNLICENSED

      - name: Build & push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=keycloak-${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=keycloak-${{ matrix.image }}
          provenance: ${{ github.event_name != 'pull_request' }}
          sbom: ${{ github.event_name != 'pull_request' }}

      - name: Image digest
        if: github.event_name != 'pull_request'
        run: |
          echo "Pushed ${REGISTRY}/${REPO}/keycloak-${IMAGE}@${DIGEST}" >> "$GITHUB_STEP_SUMMARY"
          echo "Tags: ${TAGS}" >> "$GITHUB_STEP_SUMMARY"
        env:
          REPO: ${{ github.repository }}
          IMAGE: ${{ matrix.image }}
          DIGEST: ${{ steps.build.outputs.digest }}
          TAGS: ${{ steps.meta.outputs.tags }}
