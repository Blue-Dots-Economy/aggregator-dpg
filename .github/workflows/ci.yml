name: CI

on:
  push:
    branches:
      - main
      - 'v0.*'
  pull_request:
    branches:
      - main
      - 'v0.*'

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Cache turbo outputs
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm -w lint

      - name: Type-check
        run: pnpm -w typecheck

      - name: Test
        run: pnpm -w test

      - name: Build
        run: pnpm -w build

  docker:
    name: Docker / ${{ matrix.app }}
    runs-on: ubuntu-latest
    needs: ci

    strategy:
      fail-fast: false
      matrix:
        app: [api, web]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build (PR — no push)
        if: github.event_name == 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/${{ matrix.app }}/Dockerfile
          push: false
          tags: aggregator-dpg-${{ matrix.app }}:pr-${{ github.event.number }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push (main / release)
        if: github.event_name == 'push'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/${{ matrix.app }}/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/aggregator-dpg-${{ matrix.app }}:${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/aggregator-dpg-${{ matrix.app }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # TODO: add smoke test `docker run --rm -p 3000:3000 <image> /health`
      #       once apps/api has a real HTTP server with a /health endpoint.
