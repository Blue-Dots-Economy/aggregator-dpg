name: Keycloak Theme

# Builds one brand-specific Keycloak theme image per run. Manual-only —
# pick the network via the `network` dropdown in the Actions tab.
#
# Brand strings come from config/<network>/keycloak.env, fed verbatim as
# docker build-args (themes.Dockerfile bakes them into theme.properties).
# Tags are network-prefixed: <network>-<branch>, <network>-sha-xxxxxxx, and
# <network>-latest on the default branch.
#
# Server image lives in keycloak-image-build.yaml.

on:
  workflow_dispatch:
    inputs:
      network:
        description: 'Network to build the theme image for'
        required: true
        type: choice
        default: blue_dot
        options:
          - blue_dot
          - orange_dot
          - purple_dot

concurrency:
  group: keycloak-theme-${{ github.ref }}-${{ inputs.network }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io

jobs:
  theme:
    name: Docker / keycloak-theme (${{ inputs.network }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Mirror build-theme-image.sh: every non-comment, non-blank KEY=value
      # line in the network's keycloak.env becomes a build-arg, plus NETWORK.
      # Fails loudly if the env file is missing so a bad network input can't
      # silently produce a default-branded image.
      - name: Collect brand build-args
        id: brandargs
        run: |
          ENV_FILE="config/${{ inputs.network }}/keycloak.env"
          if [ ! -f "$ENV_FILE" ]; then
            echo "::error::missing $ENV_FILE for network '${{ inputs.network }}'"
            exit 1
          fi
          {
            echo 'args<<__ARGS_EOF__'
            grep -vE '^[[:space:]]*#|^[[:space:]]*$' "$ENV_FILE"
            echo "NETWORK=${{ inputs.network }}"
            echo '__ARGS_EOF__'
          } >> "$GITHUB_OUTPUT"

      - name: Compute image tags & labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}/keycloak-theme
          flavor: |
            prefix=${{ inputs.network }}-,onlatest=true
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.title=aggregator-dpg-keycloak-theme-${{ inputs.network }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.licenses=UNLICENSED

      - name: Build & push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/keycloak/themes.Dockerfile
          platforms: linux/amd64
          push: true
          build-args: ${{ steps.brandargs.outputs.args }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=keycloak-theme-${{ inputs.network }}
          cache-to: type=gha,mode=max,scope=keycloak-theme-${{ inputs.network }}
          provenance: true
          sbom: true

      - name: Image digest
        run: |
          echo "Pushed ${REGISTRY}/${REPO}/keycloak-theme (${NETWORK})@${DIGEST}" >> "$GITHUB_STEP_SUMMARY"
          echo "Tags: ${TAGS}" >> "$GITHUB_STEP_SUMMARY"
        env:
          REPO: ${{ github.repository }}
          NETWORK: ${{ inputs.network }}
          DIGEST: ${{ steps.build.outputs.digest }}
          TAGS: ${{ steps.meta.outputs.tags }}
