name: Close linked issues on merge

on:
  pull_request:
    types: [closed]
    branches:
      - develop
      - main
      - 'v0.*'

permissions:
  issues: write

jobs:
  close-issues:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: Close issues referenced with Closes keyword
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.pull_request.body || '';
            const pattern = /(?:closes?|fixes?|resolves?)\s+#(\d+)/gi;
            const matches = [...body.matchAll(pattern)];

            if (matches.length === 0) {
              console.log('No linked issues found in PR body.');
              return;
            }

            for (const match of matches) {
              const issueNumber = parseInt(match[1]);
              try {
                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issueNumber,
                  state: 'closed',
                });
                console.log(`Closed #${issueNumber}`);
              } catch (err) {
                console.warn(`Could not close #${issueNumber}: ${err.message}`);
              }
            }
