name: Keycloak Server

# Builds the custom Keycloak SPI image (network-agnostic). Manual-only —
# run from the Actions tab on demand. Theme images live in a separate
# workflow (keycloak-theme-build.yaml).

on:
  workflow_dispatch:

concurrency:
  group: keycloak-server-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io

jobs:
  server:
    name: Docker / keycloak-server
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags & labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}/keycloak-server
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.title=aggregator-dpg-keycloak-server
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.licenses=UNLICENSED

      - name: Build & push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: infra/keycloak
          file: infra/keycloak/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=keycloak-server
          cache-to: type=gha,mode=max,scope=keycloak-server
          provenance: true
          sbom: true

      - name: Image digest
        run: |
          echo "Pushed ${REGISTRY}/${REPO}/keycloak-server@${DIGEST}" >> "$GITHUB_STEP_SUMMARY"
          echo "Tags: ${TAGS}" >> "$GITHUB_STEP_SUMMARY"
        env:
          REPO: ${{ github.repository }}
          DIGEST: ${{ steps.build.outputs.digest }}
          TAGS: ${{ steps.meta.outputs.tags }}
